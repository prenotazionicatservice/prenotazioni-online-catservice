<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT Service - Prenotazione</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial;}

body{
    background:url('./sfondo.jpg') no-repeat center center;
    background-size:cover;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding-top:20px;
    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
    top:0;left:0;
    z-index:-1;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header img{
    max-width:140px;
    display:block;
    margin:0 auto;
}

.container{
    max-width:420px;
    width:100%;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 25px rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.2);
    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

h2{text-align:center;color:#c62828;margin-bottom:20px;position:relative;}

input, select{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border-radius:8px;
    border:1px solid #ccc;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
}

input::placeholder{color:#ddd;}
select{background:rgba(255,255,255,0.1);}
input:focus, select:focus{background:rgba(255,255,255,0.2); transform:scale(1.02);}

#btn{
    width:100%;
    padding:15px;
    background:linear-gradient(45deg,#c62828,#b71c1c);
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    animation:pulse 2s infinite;
}

#btn::before{
    content:"";
    position:absolute;
    width:200%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.7),transparent);
    top:0;
    left:-100%;
    animation:shine 3s infinite;
}

#btn:active{transform:scale(0.95);}

.whatsapp-icon{
    width:24px;
    height:24px;
    animation:iconBounce 1.2s infinite;
}

@keyframes iconBounce{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-4px); }
}

@keyframes pulse{
    0%{ box-shadow:0 0 10px rgba(198,40,40,0.6);}
    50%{ box-shadow:0 0 25px rgba(198,40,40,1);}
    100%{ box-shadow:0 0 10px rgba(198,40,40,0.6);}
}

@keyframes shine{
    0%{left:-100%;}
    50%{left:100%;}
    100%{left:100%;}
}

/* Fiamma sotto il pulsante */
.fiamma{
    text-align:center;
    margin-top:20px;
    color:white;
    font-size:20px;
    font-weight:bold;
    position:relative;
}

.fire{
    display:inline-block;
    animation:fireContinuous 1s infinite alternate;
}

@keyframes fireContinuous{
    0% { transform: scale(1.1) rotate(-5deg); text-shadow: 0 0 5px #ff9800, 0 0 15px #ff5722, 0 0 25px #ff0000; }
    25% { transform: scale(1.3) rotate(5deg); text-shadow: 0 0 10px #ff9800, 0 0 25px #ff5722, 0 0 40px #ff0000; }
    50% { transform: scale(1.2) rotate(-3deg); text-shadow: 0 0 7px #ff9800, 0 0 20px #ff5722, 0 0 35px #ff0000; }
    75% { transform: scale(1.35) rotate(4deg); text-shadow: 0 0 12px #ff9800, 0 0 28px #ff5722, 0 0 45px #ff0000; }
    100% { transform: scale(1.1) rotate(-5deg); text-shadow: 0 0 5px #ff9800, 0 0 15px #ff5722, 0 0 25px #ff0000; }
}

/* MODALE */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    top:0;left:0;
    display:none;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    width:90%;
    max-width:320px;
}

.box button{
    width:45%;
    padding:10px;
    margin:5px;
    border:none;
    border-radius:6px;
    font-weight:bold;
}

.ok{background:#c62828;color:white;}
.no{background:#ccc;}

.success{
    display:none;
    text-align:center;
    color:#2e7d32;
    margin-top:10px;
    font-weight:bold;
}

.footer{
    text-align:center;
    color:white;
    font-size:13px;
    padding:15px;
}
</style>
</head>

<body>

<div class="header">
<img src="./logo.png" alt="Logo CAT Service">
</div>

<div class="container">
<h2>Prenota il tuo intervento</h2>

<input type="text" id="nome" placeholder="Nome" required>
<input type="text" id="cognome" placeholder="Cognome" required>
<input type="text" id="indirizzo" placeholder="Indirizzo completo" required>
<input type="tel" id="telefono" placeholder="Telefono" required>
<input type="tel" id="telefono_fisso" placeholder="Telefono fisso (facoltativo)">
<input type="text" id="marca" placeholder="Marca stufa" required>
<input type="text" id="modello" placeholder="Modello stufa (facoltativo)">

<select id="tipoIntervento" required>
    <option value="">Tipologia intervento</option>
    <option value="Manutenzione">Manutenzione</option>
    <option value="Riparazione">Riparazione</option>
    <option value="Prima accensione">Prima accensione</option>
</select>

<label>Data prenotazione intervento:</label>
<input type="text" id="data" readonly>

<button id="btn">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="whatsapp-icon" alt="WhatsApp">
  Prenota su WhatsApp
</button>

<div class="fiamma">
<span class="fire">🔥</span> CAT SERVICE DI FABIO CAMPITIELLO
</div>

<div class="success" id="successMsg">
✅ Prenotazione inviata! Apri WhatsApp e premi INVIA
</div>
</div>

<!-- MODALE -->
<div class="modal" id="modal">
<div class="box">
<h3>Conferma</h3>
<p>Inviare la prenotazione su WhatsApp?</p>
<button class="no" id="annulla">Annulla</button>
<button class="ok" id="conferma">Invia</button>
</div>
</div>

<div class="footer">C.A.T. Service</div>

<script>
// DATA ITALIANA
window.onload=function(){
    let oggi = new Date();
    let giorno = String(oggi.getDate()).padStart(2, '0');
    let mese = String(oggi.getMonth() + 1).padStart(2, '0');
    let anno = oggi.getFullYear();
    document.getElementById("data").value = giorno + "/" + mese + "/" + anno;
};

let messaggio="";
document.getElementById("btn").onclick=function(){
    let nome=document.getElementById("nome").value;
    let cognome=document.getElementById("cognome").value;
    let indirizzo=document.getElementById("indirizzo").value;
    let telefono=document.getElementById("telefono").value;
    let telefonoFisso=document.getElementById("telefono_fisso").value;
    let marca=document.getElementById("marca").value;
    let modello=document.getElementById("modello").value;
    let tipo=document.getElementById("tipoIntervento").value;
    let data=document.getElementById("data").value;

    if(!nome||!cognome||!indirizzo||!telefono||!marca||!tipo){
        alert("Compila tutti i campi obbligatori!");
        return;
    }

    messaggio=`🔥 Prenotazione CAT Service
Nome: ${nome}
Cognome: ${cognome}
Indirizzo: ${indirizzo}
Telefono: ${telefono}
Telefono fisso: ${telefonoFisso}
Marca stufa: ${marca}
Modello stufa: ${modello}
Tipo intervento: ${tipo}
Data prenotazione intervento: ${data}`;

    document.getElementById("modal").style.display="flex";
}

document.getElementById("annulla").onclick=function(){
    document.getElementById("modal").style.display="none";
}

document.getElementById("conferma").onclick=function(){
    let url="https://wa.me/393394245508?text="+encodeURIComponent(messaggio);
    window.open(url,"_blank");
    document.getElementById("modal").style.display="none";
    document.getElementById("successMsg").style.display="block";
}
</script>

</body>
</html>
