<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C.A.T. SERVICE - Prenotazione</title>

    <style>
        /* RESET GENERALE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #200505;
            background: radial-gradient(circle at 50% 50%, #450a0a, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 80px 15px 40px 15px; 
            color: #fff;
        }

        /* --- 1. NAVBAR MINI LOGO --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(239, 68, 68, 0.4);
            z-index: 1000;
        }

        .nav-content { display: flex; align-items: center; gap: 12px; }
        .mini-logo { height: 35px; width: auto; filter: drop-shadow(0 0 5px #ef4444); }
        .nav-title { font-weight: bold; font-size: 14px; letter-spacing: 1px; color: #ef4444; text-transform: uppercase; }

        /* --- 2. ANIMAZIONE GLOW APERTURA --- */
        @keyframes openingGlow {
            0% { opacity: 0; transform: translateY(20px); box-shadow: 0 0 0px rgba(239, 68, 68, 0); }
            50% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.4); }
            100% { opacity: 1; transform: translateY(0); box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        }

        .container {
            width: 100%;
            max-width: 450px; 
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); 
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            animation: openingGlow 1.2s ease-out forwards;
        }

        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-img {
            width: 220px;
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.5));
            animation: logoPulse 3s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.4)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.8)); }
        }

        .input-group { margin-bottom: 15px; width: 100%; }
        label { display: block; font-size: 11px; color: #ef4444; text-transform: uppercase; margin-bottom: 5px; padding-left: 5px; font-weight: bold; }
        
        .input-icon { position: relative; display: flex; align-items: center; width: 100%; }
        
        /* ILLUMINAZIONE ICONE */
        .input-icon span {
            position: absolute;
            left: 12px;
            font-size: 18px;
            z-index: 5;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .input-icon:focus-within span {
            text-shadow: 0 0 15px #ef4444, 0 0 25px #ef4444;
            transform: scale(1.2);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px 12px 42px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px; 
            transition: 0.3s;
            -webkit-appearance: none; 
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }

        button#btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #b91c1c, #ef4444);
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            animation: btnGlow 2s infinite ease-in-out;
        }

        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.5); }
            50% { box-shadow: 0 0 25px rgba(239, 68, 68, 0.9); }
        }

        .privacy-notice {
            font-size: 10px;
            color: #aaa;
            text-align: center;
            margin: 15px 0;
            line-height: 1.4;
        }

        .success-info {
            text-align: center;
            color: #ef4444;
            font-weight: bold;
            font-size: 13px;
            margin-top: 10px;
            animation: textFlash 1.5s infinite;
        }

        @keyframes textFlash {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 15px #ef4444; }
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .box { background: #111; padding: 25px; border-radius: 20px; text-align: center; border: 2px solid #ef4444; width: 100%; max-width: 320px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .ok { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; flex: 1; font-weight: bold; }
        .no { background: #444; color: white; border: none; padding: 12px; border-radius: 10px; flex: 1; }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="nav-content">
        <img src="logo.PNG" alt="Mini Logo" class="mini-logo" onerror="this.src='logo.png';">
        <span class="nav-title">C.A.T. Service</span>
    </div>
</nav>

<div class="container">
    <div class="logo-container">
        <img src="logo.PNG?v=1" alt="C.A.T. Service" class="logo-img" onerror="this.src='logo.png';">
    </div>

    <div class="input-group"><div class="input-icon"><span>👤</span><input type="text" id="nome" placeholder="Nome"></div></div>
    <div class="input-group"><div class="input-icon"><span>👤</span><input type="text" id="cognome" placeholder="Cognome"></div></div>
    <div class="input-group"><div class="input-icon"><span>📍</span><input type="text" id="indirizzo" placeholder="Indirizzo completo"></div></div>
    <div class="input-group"><div class="input-icon"><span>📱</span><input type="tel" id="telefono" placeholder="Telefono cellulare"></div></div>
    <div class="input-group"><div class="input-icon"><span>☎️</span><input type="tel" id="telefono_fisso" placeholder="Telefono fisso (facoltativo)"></div></div>

    <div class="input-group">
        <div class="input-icon">
            <span>🔥</span>
            <select id="marcaSelect">
                <option value="">Marca Stufa</option>
                <option value="MCZ">MCZ</option>
                <option value="PALAZZETTI">PALAZZETTI</option>
                <option value="RAVELLI">RAVELLI</option>
                <option value="MORETTI DESIGN">MORETTI DESIGN</option>
                <option value="PEGASO">PEGASO</option>
                <option value="RED">RED</option>
                <option value="BRISACH">BRISACH</option>
                <option value="CADEL">CADEL</option>
                <option value="FREEPOINT">FREEPOINT</option>
                <option value="ROYAL">ROYAL</option>
                <option value="Elledì">Elledì</option>
                <option value="Karmek One">Karmek One</option>
                <option value="Lincar">Lincar</option>
                <option value="Altro">Altro (specifica)</option>
            </select>
        </div>
    </div>
    <div class="input-group" id="marcaAltroGroup" style="display:none;"><div class="input-icon"><span>✍️</span><input type="text" id="marcaAltro" placeholder="Specifica marca"></div></div>
    <div class="input-group"><div class="input-icon"><span>⚙️</span><input type="text" id="modello" placeholder="Modello stufa (facoltativo)"></div></div>

    <div class="input-group">
        <div class="input-icon">
            <span>🧰</span>
            <select id="tipoIntervento">
                <option value="">Tipologia intervento</option>
                <option value="Manutenzione">Manutenzione</option>
                <option value="Riparazione">Riparazione</option>
                <option value="Prima accensione">Prima accensione</option>
            </select>
        </div>
    </div>

    <div id="sezioneProblemi">
        <div class="input-group">
            <label>Problematica</label>
            <div class="input-icon">
                <span>🛠️</span>
                <select id="problemaSelect">
                    <option value="">Seleziona problema</option>
                    <option value="Errore sul display">Errore sul display ⚠️</option>
                    <option value="Stufa non si accende">Stufa non si accende</option>
                    <option value="Vetro subito nero">Vetro subito nero</option>
                    <option value="Rumore anomalo">Rumore anomalo</option>
                    <option value="Si spegne da sola">Si spegne da sola</option>
                    <option value="Non carica pellet">Non carica pellet</option>
                    <option value="Altro">Altro (specifica sotto)</option>
                </select>
            </div>
        </div>

        <div class="input-group" id="erroriDisplayGroup" style="display:none;">
            <label>Tipo di errore</label>
            <div class="input-icon">
                <span>📟</span>
                <select id="listaErrori">
                    <option value="">Seleziona l'allarme...</option>
                    <option value="AL 1 - Blackout">AL 1 - Blackout</option>
                    <option value="AL 2 - Sonda Fumi">AL 2 - Sonda Fumi</option>
                    <option value="AL 3 - Hot Fumi">AL 3 - Hot Fumi</option>
                    <option value="AL 4 - Aspiratore">AL 4 - Guasto Estrattore</option>
                    <option value="AL 5 - No Accensione">AL 5 - No Accensione</option>
                    <option value="AL 6 - No Pellet">AL 6 - No Pellet</option>
                    <option value="AL 7 - Termico">AL 7 - Sicurezza Termica</option>
                    <option value="AL 8 - No Depressione">AL 8 - No Depressione</option>
                    <option value="AL 9 - Coclea">AL 9 - Blocco Coclea</option>
                    <option value="Service">Scritta SERVICE</option>
                    <option value="Errore Sonda K">Errore Sonda K</option>
                    <option value="Errore Autopulizia">Errore Autopulizia</option>
                    <option value="Errore Pressione Alta">Errore Pressione Alta</option>
                    <option value="Errore Pressione Bassa">Errore Pressione Bassa</option>
                    <option value="Errore Debimetro">Errore Debimetro</option>
                    <option value="Errore No Flusso">Errore No Flusso</option>
                    <option value="Errore Porta Aperta">Errore Porta Aperta</option>
                    <option value="Errore Depressione">Errore Depressione (Specifico)</option>
                    <option value="Errore Sicurezza Termica">Errore Sicurezza Termica (Specifico)</option>
                    <option value="Altro">Altro errore</option>
                </select>
            </div>
        </div>

        <div class="input-group" id="altroBox" style="display:none;">
            <label>Descrizione guasto</label>
            <div class="input-icon"><span>📝</span><textarea id="problemaNote" placeholder="Descrivi il guasto"></textarea></div>
        </div>
    </div>

    <div class="input-group">
        <label>Data di oggi</label>
        <input type="text" id="data" readonly style="text-align:center; color:#ef4444; font-weight:bold; background:rgba(0,0,0,0.2);">
    </div>

    <div class="privacy-notice">
        L'invio acconsente al trattamento dei dati (GDPR) per l'assistenza tecnica.
    </div>

    <button id="btn">Prenota su WhatsApp</button>

    <div class="success-info">
        ✅ Verrai indirizzato a WhatsApp
    </div>
</div>

<div class="modal" id="modal">
    <div class="box">
        <h3>Conferma Inviata</h3>
        <p style="color:#ccc; margin:10px 0;">Vuoi procedere con l'invio del messaggio?</p>
        <div class="modal-btns">
            <button class="no" id="annulla">Modifica</button>
            <button class="ok" id="conferma">Invia Ora</button>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        document.getElementById("data").value = new Date().toLocaleDateString('it-IT');
    };

    const tipoSelect = document.getElementById("tipoIntervento");
    const sezioneProblemi = document.getElementById("sezioneProblemi");
    const problemaSelect = document.getElementById("problemaSelect");
    const erroriDisplayGroup = document.getElementById("erroriDisplayGroup");
    const altroBox = document.getElementById("altroBox");
    const marcaSelect = document.getElementById("marcaSelect");
    const marcaAltroGroup = document.getElementById("marcaAltroGroup");

    tipoSelect.onchange = function() { sezioneProblemi.style.display = (this.value === "Prima accensione") ? "none" : "block"; };
    marcaSelect.onchange = function() { marcaAltroGroup.style.display = (this.value === "Altro") ? "block" : "none"; };
    problemaSelect.onchange = function() {
        erroriDisplayGroup.style.display = (this.value === "Errore sul display") ? "block" : "none";
        altroBox.style.display = (this.value === "Altro" || this.value === "Errore sul display") ? "block" : "none";
    };

    let messaggioGlobal = "";

    document.getElementById("btn").onclick = function() {
        let nome = document.getElementById("nome").value.trim();
        let cognome = document.getElementById("cognome").value.trim();
        let indirizzo = document.getElementById("indirizzo").value.trim();
        let telefono = document.getElementById("telefono").value.trim();
        let marca = marcaSelect.value === "Altro" ? document.getElementById("marcaAltro").value : marcaSelect.value;
        let tipo = tipoSelect.value;

        if(!nome || !cognome || !indirizzo || !telefono || !marca || !tipo) {
            alert("Compila i campi obbligatori."); return;
        }

        let prob = problemaSelect.value;
        if(prob === "Errore sul display") prob = "Errore: " + document.getElementById("listaErrori").value;
        let note = document.getElementById("problemaNote").value;

        messaggioGlobal = `*RICHIESTA INTERVENTO*\n*C.A.T. SERVICE*\n\n👤 *Cliente:* ${nome} ${cognome}\n📍 *Indirizzo:* ${indirizzo}\n📱 *Cell:* ${telefono}\n🔥 *Stufa:* ${marca}\n🧰 *Intervento:* ${tipo}\n🛠️ *Problema:* ${prob}${note ? " ("+note+")" : ""}\n📅 *Data:* ${document.getElementById("data").value}`;
        document.getElementById("modal").style.display = "flex";
    };

    document.getElementById("annulla").onclick = function() { document.getElementById("modal").style.display = "none"; };

    document.getElementById("conferma").onclick = function() {
        window.open("https://wa.me/393394245508?text=" + encodeURIComponent(messaggioGlobal), "_blank");
        document.getElementById("modal").style.display = "none";
    };
</script>

</body>
</html>
