<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C.A.T. SERVICE - Prenotazione</title>

    <style>
        /* RESET GENERALE */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background: #200505; 
            background: radial-gradient(circle at 50% 50%, #450a0a, #000000); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            padding: 80px 15px 40px 15px; 
            color: #fff; 
        }

        /* NAVBAR */
        .navbar { 
            position: fixed; top: 0; left: 0; width: 100%; height: 60px; 
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); display: flex; align-items: center; 
            padding: 0 20px; border-bottom: 1px solid rgba(239, 68, 68, 0.4); z-index: 1000; 
        }
        .nav-content { display: flex; align-items: center; gap: 12px; }
        .mini-logo { height: 35px; width: auto; filter: drop-shadow(0 0 5px #ef4444); }
        .nav-title { font-weight: bold; font-size: 14px; letter-spacing: 1px; color: #ef4444; text-transform: uppercase; }

        /* CONTAINER */
        .container { 
            width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            border-radius: 20px; padding: 25px; border: 1px solid rgba(239, 68, 68, 0.3); 
            animation: openingGlow 1.2s ease-out forwards; 
        }
        
        @keyframes openingGlow { 
            0% { opacity: 0; transform: translateY(20px); } 
            100% { opacity: 1; transform: translateY(0); box-shadow: 0 15px 35px rgba(0,0,0,0.6); } 
        }

        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-img { 
            width: 220px; max-width: 100%; height: auto; margin-bottom: 20px; 
            filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.5)); 
            animation: logoPulse 3s infinite ease-in-out; 
        }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* PROGRESS BAR */
        .progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 20px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .progress-bar { height: 100%; width: 0%; background: #ef4444; transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; }

        /* INPUTS */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; width: 100%; }
        label { display: block; font-size: 11px; color: #ef4444; text-transform: uppercase; margin-bottom: 5px; padding-left: 5px; font-weight: bold; }
        .input-icon { position: relative; display: flex; align-items: center; width: 100%; }
        .input-icon span { position: absolute; left: 12px; font-size: 18px; z-index: 5; pointer-events: none; }

        input, select, textarea { 
            width: 100%; padding: 12px 15px 12px 42px; background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; 
            font-size: 16px; transition: 0.3s; 
        }
        select option { background-color: #1a1a1a; color: white; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #ef4444; background: rgba(255, 255, 255, 0.15); }

        /* BUTTON WHATSAPP */
        button#btn { 
            position: relative; width: 100%; padding: 20px; margin-top: 15px; border: none; 
            border-radius: 15px; background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); 
            color: white; font-size: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 10px; 
            overflow: hidden; box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4); 
            transition: all 0.3s ease;
            animation: pulse-green 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -60%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        button#btn::after {
            content: ''; position: absolute; top: -50%; left: -60%; width: 20%; height: 200%;
            background: rgba(255, 255, 255, 0.4); transform: rotate(30deg); animation: shimmer 3s infinite;
        }

        .preview-box { margin-top: 10px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px dashed rgba(239, 68, 68, 0.5); font-size: 13px; line-height: 1.6; }
        .preview-title { color: #ef4444; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; display: block; }

        .privacy-notice { font-size: 10px; color: #aaa; text-align: center; margin: 25px 0 5px 0; font-style: italic; }
        
        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .box { background: #111; padding: 25px; border-radius: 20px; text-align: center; border: 2px solid #ef4444; width: 100%; max-width: 320px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .ok { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; flex: 1; font-weight: bold; }
        .no { background: #444; color: white; border: none; padding: 12px; border-radius: 10px; flex: 1; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-content">
        <img src="logo.PNG" alt="Logo" class="mini-logo" onerror="this.src='logo.png';">
        <span class="nav-title">C.A.T. Service</span>
    </div>
</nav>

<div class="container">
    <div class="logo-container">
        <img src="logo.PNG?v=1" alt="Logo" class="logo-img" onerror="this.src='logo.png';">
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <div class="input-group">
        <div class="input-icon"><span>👤</span><input type="text" id="nomeCognome" placeholder="Nome e Cognome" oninput="updateUI()"></div>
    </div>

    <div class="input-group">
        <div class="input-icon"><span>📍</span><input type="text" id="indirizzo" placeholder="Indirizzo e n. civico" oninput="updateUI()"></div>
    </div>

    <div class="input-row">
        <div class="input-icon">
            <span>🏙️</span>
            <input type="text" id="comune" list="listaComuni" placeholder="Comune" oninput="autoCompleteProvincia(); updateUI();">
            <datalist id="listaComuni"></datalist>
        </div>
        <div class="input-icon">
            <span>🌍</span>
            <select id="provincia" onchange="updateUI()">
                <option value="">Prov.</option>
                <option value="NA">NA</option>
                <option value="SA">SA</option>
                <option value="AV">AV</option>
            </select>
        </div>
    </div>

    <div class="input-row">
        <div class="input-icon"><span>📱</span><input type="tel" id="telefono" placeholder="Cellulare" oninput="updateUI()"></div>
        <div class="input-icon"><span>☎️</span><input type="tel" id="telefono_fisso" placeholder="Fisso (opz)" oninput="updateUI()"></div>
    </div>

    <div class="input-row">
        <div class="input-icon">
            <span>🔥</span>
            <select id="marcaSelect" onchange="populateErrorList(); updateUI();">
                <option value="">Marca</option>
                <option value="MCZ">MCZ</option>
                <option value="PALAZZETTI">PALAZZETTI</option>
                <option value="RAVELLI">RAVELLI</option>
                <option value="MORETTI DESIGN">MORETTI DESIGN</option>
                <option value="PEGASO">PEGASO</option>
                <option value="RED">RED</option>
                <option value="BRISACH">BRISACH</option>
                <option value="CADEL">CADEL</option>
                <option value="FREEPOINT">FREEPOINT</option>
                <option value="ROYAL">ROYAL</option>
                <option value="Elledì">Elledì</option>
                <option value="Karmek One">Karmek One</option>
                <option value="Lincar">Lincar</option>
                <option value="Altro">Altro...</option>
            </select>
        </div>
        <div class="input-icon"><span>⚙️</span><input type="text" id="modello" placeholder="Modello (opz)" oninput="updateUI()"></div>
    </div>

    <div class="input-group" id="marcaAltroGroup" style="display:none;"><div class="input-icon"><span>✍️</span><input type="text" id="marcaAltro" placeholder="Specifica marca" oninput="updateUI()"></div></div>

    <div class="input-group">
        <div class="input-icon">
            <span>🧰</span>
            <select id="tipoIntervento" onchange="updateUI()">
                <option value="">Tipologia intervento</option>
                <option value="Manutenzione">Manutenzione</option>
                <option value="Riparazione">Riparazione</option>
                <option value="Prima accensione">Prima accensione</option>
            </select>
        </div>
    </div>

    <div id="sezioneProblemi">
        <div class="input-group">
            <div class="input-icon">
                <span>🛠️</span>
                <select id="problemaSelect" onchange="updateUI()">
                    <option value="">Seleziona problema</option>
                    <option value="Errore sul display">Errore sul display ⚠️</option>
                    <option value="Stufa non si accende">Stufa non si accende</option>
                    <option value="Vetro subito nero">Vetro subito nero</option>
                    <option value="Rumore anomalo">Rumore anomalo</option>
                    <option value="Si spegne da sola">Si spegne da sola</option>
                    <option value="Non carica pellet">Non carica pellet</option>
                    <option value="Altro">Altro (specifica sotto)</option>
                </select>
            </div>
        </div>

       <div class="input-group" id="erroriDisplayGroup" style="display:none;">
            <div class="input-icon">
                <span>📟</span>
                <select id="listaErrori" onchange="updateUI()">
                    <option value="">Scegli Marca prima...</option>
                </select>
            </div>
        </div>

        <div class="input-group" id="altroBox" style="display:none;">
            <div class="input-icon"><span>📝</span><textarea id="problemaNote" placeholder="Descrivi meglio il problema..." oninput="updateUI()"></textarea></div>
        </div>
    </div>

    <div class="input-group">
        <label>Data di oggi</label>
        <input type="text" id="data" readonly style="text-align:center; color:#ef4444; font-weight:bold; background:rgba(0,0,0,0.2);">
    </div>

    <button id="btn">
        <svg width="22" height="22" viewBox="0 0 448 512" fill="white"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.7 17.8 69.4 27.2 106.2 27.2 122.4 0 222-99.6 222-222 0-59.3-23-115.1-65.1-157.1zM223.9 446.7c-33.1 0-65.6-8.9-93.9-25.7l-6.7-4-69.8 18.3 18.7-68.1-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.5-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 54 81.2 54 130.4 0 101.7-82.8 184.5-184.5 184.5zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.2-16.4-14.6-27.4-32.7-30.6-38.1-3.2-5.5-.3-8.5 2.4-11.2 2.5-2.4 5.5-6.5 8.3-9.7 2.8-3.3 3.7-5.6 5.6-9.3 1.9-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.7 23.5 9.2 31.6 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
        INVIA PRENOTAZIONE SU WHATSAPP
    </button>

    <div class="privacy-notice">L'invio acconsente al trattamento dei dati (GDPR).</div>

    <div class="preview-box" id="previewBox">
        <span class="preview-title">Anteprima Messaggio:</span>
        <div id="previewContent">Inizia a compilare...</div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="box">
        <h3>Conferma Invio</h3>
        <p style="color:#ccc; margin:10px 0;">Procedere con l'invio su WhatsApp?</p>
        <div class="modal-btns">
            <button class="no" id="annulla">Modifica</button>
            <button class="ok" id="conferma">Invia Ora</button>
        </div>
    </div>
</div>

<script>
    // Database Comuni principali e province
    const databaseComuni = {
        "Napoli": "NA", "Acerra": "NA", "Afragola": "NA", "Arzano": "NA", "Bacoli": "NA", "Caivano": "NA", "Cardito": "NA", "Casalnuovo di Napoli": "NA", "Casavatore": "NA", "Casoria": "NA", "Castellammare di Stabia": "NA", "Ercolano": "NA", "Frattamaggiore": "NA", "Giugliano in Campania": "NA", "Marano di Napoli": "NA", "Melito di Napoli": "NA", "Mugnano di Napoli": "NA", "Nola": "NA", "Ottaviano": "NA", "Pomigliano d'Arco": "NA", "Pompei": "NA", "Portici": "NA", "Pozzuoli": "NA", "Quarto": "NA", "San Giorgio a Cremano": "NA", "San Giuseppe Vesuviano": "NA", "Sant'Antimo": "NA", "Somma Vesuviana": "NA", "Torre Annunziata": "NA", "Torre del Greco": "NA", "Villaricca": "NA", "Volla": "NA",
        "Salerno": "SA", "Angri": "SA", "Battipaglia": "SA", "Cava de' Tirreni": "SA", "Eboli": "SA", "Nocera Inferiore": "SA", "Nocera Superiore": "SA", "Pagani": "SA", "Pontecagnano Faiano": "SA", "Scafati": "SA", "Sarno": "SA", "Santomango Piemonte": "SA", "Baronissi": "SA", "Fisciano": "SA", "Mercato San Severino": "SA", "Castel San Giorgio": "SA", "Roccapiemonte": "SA", "Vietri sul Mare": "SA", "Amalfi": "SA", "Maiori": "SA", "Minori": "SA", "Positano": "SA",
        "Avellino": "AV", "Ariano Irpino": "AV", "Atripalda": "AV", "Mercogliano": "AV", "Solofra": "AV", "Monteforte Irpino": "AV", "Montoro": "AV", "Grottaminarda": "AV", "Mirabella Eclano": "AV", "Montella": "AV", "Mugnano del Cardinale": "AV", "Baiano": "AV", "Avella": "AV", "Forino": "AV", "Serino": "AV"
    };

    const erroriGenerici = ["AL 1 - Blackout", "AL 2 - Sonda Fumi", "AL 3 - Hot Fumi", "AL 4 - Guasto Estrattore", "AL 5 - Mancata Accensione", "AL 6 - Mancanza Pellet", "AL 7 - Sicurezza Termica", "AL 8 - Depressione", "AL 9 - Blocco Coaugulo", "SERVICE"];

    const dbErrori = {
        "MCZ": ["A01 (ACCENSIONE)", "A02 (FUOCO)", "A03 (SICUREZZA)", "A04 (TEMP FUMI)", "A05 (PRESSIONE)", "A10 (CANDELETTA)", "SERVICE"],
        "PALAZZETTI": ["E101 ACCENSIONE", "E108 SICUREZZA", "E109 PRESSIONE", "A002 MANUTENZIONE", "SCOPINA GIALLA"],
        "MORETTI DESIGN": ["ER01 TERMOSTATO", "ER12 ACCENSIONE", "ER15 BLACKOUT", "SERV PULIZIA"],
        "RAVELLI": ["AL01 BLACKOUT", "AL05 ACCENSIONE", "AL06 NO PELLET", "AL07 TERMICA", "AL08 DEPRESSIONE"]
    };

    const ids = ["nomeCognome", "indirizzo", "comune", "provincia", "telefono", "telefono_fisso", "marcaSelect", "marcaAltro", "modello", "tipoIntervento", "problemaSelect", "listaErrori", "problemaNote"];

    window.onload = function() {
        document.getElementById("data").value = new Date().toLocaleDateString('it-IT');
        setupComuniList();
        loadLocalStorage();
        populateErrorList();
        updateUI();
    };

    function setupComuniList() {
        const dl = document.getElementById("listaComuni");
        Object.keys(databaseComuni).sort().forEach(comune => {
            const opt = document.createElement("option");
            opt.value = comune;
            dl.appendChild(opt);
        });
    }

    function autoCompleteProvincia() {
        const comuneInput = document.getElementById("comune").value;
        const provinciaSelect = document.getElementById("provincia");
        if(databaseComuni[comuneInput]) {
            provinciaSelect.value = databaseComuni[comuneInput];
        }
    }

    function populateErrorList() {
        const marca = document.getElementById("marcaSelect").value;
        const listaErrori = document.getElementById("listaErrori");
        const errori = dbErrori[marca] ? dbErrori[marca] : erroriGenerici;
        listaErrori.innerHTML = '<option value="">Seleziona l\'allarme...</option>';
        errori.forEach(err => {
            const opt = document.createElement("option");
            opt.value = err; opt.textContent = err;
            listaErrori.appendChild(opt);
        });
    }

    function saveLocalStorage() {
        ids.forEach(id => {
            const el = document.getElementById(id);
            if(el) localStorage.setItem(id, el.value);
        });
    }

    function loadLocalStorage() {
        ids.forEach(id => {
            const savedValue = localStorage.getItem(id);
            const el = document.getElementById(id);
            if(savedValue !== null && el) el.value = savedValue;
        });
    }

    function updateUI() {
        saveLocalStorage();
        const f = {
            cliente: document.getElementById("nomeCognome").value,
            indirizzo: document.getElementById("indirizzo").value,
            comune: document.getElementById("comune").value,
            prov: document.getElementById("provincia").value,
            tel: document.getElementById("telefono").value,
            marca: document.getElementById("marcaSelect").value,
            tipo: document.getElementById("tipoIntervento").value
        };

        document.getElementById("marcaAltroGroup").style.display = (f.marca === "Altro") ? "block" : "none";
        const ps = document.getElementById("problemaSelect").value;
        document.getElementById("erroriDisplayGroup").style.display = (ps === "Errore sul display") ? "block" : "none";
        document.getElementById("altroBox").style.display = (ps === "Altro" || ps === "Errore sul display") ? "block" : "none";
        document.getElementById("sezioneProblemi").style.display = (f.tipo === "Prima accensione") ? "none" : "block";

        // Progress bar (7 campi chiave ora)
        let comp = 0;
        if(f.cliente) comp++; if(f.indirizzo) comp++; if(f.comune) comp++; if(f.prov) comp++; if(f.tel) comp++; if(f.marca) comp++; if(f.tipo) comp++;
        const percent = Math.round((comp / 7) * 100);
        const bar = document.getElementById("progressBar");
        bar.style.width = percent + "%"; bar.innerText = percent + "%";
        bar.style.background = percent < 50 ? "#ef4444" : (percent < 100 ? "#f59e0b" : "#22c55e");

        const mFinale = f.marca === "Altro" ? document.getElementById("marcaAltro").value : f.marca;
        const pFinale = ps === "Errore sul display" ? "Err: " + document.getElementById("listaErrori").value : ps;

        document.getElementById("previewContent").innerHTML = `
            <b>Cliente:</b> ${f.cliente || '-'}<br>
            <b>Località:</b> ${f.comune || '-'} (${f.prov || '-'})<br>
            <b>Stufa:</b> ${mFinale || '-'} ${document.getElementById("modello").value ? '('+document.getElementById("modello").value+')' : ''}<br>
            <b>Intervento:</b> ${f.tipo || '-'}<br>
            ${f.tipo !== "Prima accensione" ? `<b>Problema:</b> ${pFinale || '-'}` : ''}
        `;
    }

    let messaggioGlobal = "";

    document.getElementById("btn").onclick = function() {
        const c = document.getElementById("nomeCognome").value.trim();
        const i = document.getElementById("indirizzo").value.trim();
        const com = document.getElementById("comune").value.trim();
        const prv = document.getElementById("provincia").value;
        const t = document.getElementById("telefono").value.trim();
        const m = document.getElementById("marcaSelect").value === "Altro" ? document.getElementById("marcaAltro").value : document.getElementById("marcaSelect").value;
        const ti = document.getElementById("tipoIntervento").value;

        if(!c || !i || !com || !prv || !t || !m || !ti) {
            alert("Per favore, compila tutti i campi obbligatori (incluso Comune e Provincia)!"); return;
        }

        let prob = document.getElementById("problemaSelect").value;
        if(prob === "Errore sul display") prob = "Errore: " + document.getElementById("listaErrori").value;
        const note = document.getElementById("problemaNote").value;
        const mod = document.getElementById("modello").value;

        messaggioGlobal = `*RICHIESTA INTERVENTO*\n*C.A.T. SERVICE*\n\n👤 *Cliente:* ${c}\n📍 *Indirizzo:* ${i}\n🏙️ *Comune:* ${com} (${prv})\n📱 *Cell:* ${t}\n🔥 *Stufa:* ${m} ${mod ? "("+mod+")" : ""}\n🧰 *Intervento:* ${ti}\n${ti !== "Prima accensione" ? "🛠️ *Problema:* "+prob+(note ? " ("+note+")" : "")+"\n" : ""}📅 *Data:* ${document.getElementById("data").value}`;
        
        document.getElementById("modal").style.display = "flex";
    };

    document.getElementById("annulla").onclick = function() { document.getElementById("modal").style.display = "none"; };
    
    document.getElementById("conferma").onclick = function() {
        window.open("https://wa.me/393394245508?text=" + encodeURIComponent(messaggioGlobal), "_blank");
        document.getElementById("modal").style.display = "none";
        localStorage.clear();
        location.reload(); 
    };
</script>

</body>
</html>
