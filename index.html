<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C.A.T. SERVICE - Prenotazione Assistenza</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        
        body { 
            background: radial-gradient(circle at 50% 50%, #450a0a, #000000); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            padding: 80px 15px 40px 15px; 
            color: #fff; 
        }

        .navbar { 
            position: fixed; top: 0; left: 0; width: 100%; height: 60px; 
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); 
            display: flex; align-items: center; padding: 0 20px; 
            border-bottom: 1px solid rgba(239, 68, 68, 0.4); z-index: 1000; 
        }
        .nav-title { font-weight: bold; font-size: 14px; color: #ef4444; text-transform: uppercase; letter-spacing: 1px; }

        .container { 
            width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(15px); border-radius: 20px; padding: 25px; 
            border: 1px solid rgba(239, 68, 68, 0.3); 
        }

        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-img { width: 220px; filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.5)); }

        .progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 18px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: #ef4444; transition: width 0.4s; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }

        .input-group { margin-bottom: 15px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        
        label { display: block; font-size: 11px; color: #ef4444; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        
        .input-icon { position: relative; width: 100%; }
        .input-icon span { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 18px; z-index: 5; }

        input, select, textarea { 
            width: 100%; padding: 12px 10px 12px 42px; background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; font-size: 16px; 
        }
        input:focus, select:focus { border-color: #ef4444; outline: none; background: rgba(255, 255, 255, 0.15); }
        
        select option { background: #1a1a1a; color: #fff; }

        button#btn { 
            width: 100%; padding: 18px; margin-top: 15px; border: none; border-radius: 15px; 
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); 
            color: white; font-weight: 900; text-transform: uppercase; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .preview-box { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px dashed #ef4444; font-size: 13px; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .box { background: #111; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #ef4444; width: 90%; max-width: 320px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .ok { background: #ef4444; color: #fff; border: none; padding: 12px; border-radius: 10px; flex: 1; font-weight: bold; }
        .no { background: #444; color: #fff; border: none; padding: 12px; border-radius: 10px; flex: 1; }
    </style>
</head>
<body>

<nav class="navbar">
    <span class="nav-title">C.A.T. Service - Assistenza Tecnica</span>
</nav>

<div class="container">
    <div class="logo-container">
        <img src="logo.PNG" alt="Logo" class="logo-img" onerror="this.src='logo.png';">
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <div class="input-group">
        <div class="input-icon"><span>👤</span><input type="text" id="nomeCognome" placeholder="Nome e Cognome"></div>
    </div>

    <div class="input-group">
        <div class="input-icon"><span>📍</span><input type="text" id="indirizzo" placeholder="Indirizzo e n. civico"></div>
    </div>

    <div class="input-row">
        <div class="input-icon">
            <span>🏙️</span>
            <input type="text" id="comune" list="listaComuni" placeholder="Comune" oninput="autoCompleteProvincia()">
            <datalist id="listaComuni"></datalist>
        </div>
        <div class="input-icon">
            <span>🌍</span>
            <select id="provincia">
                <option value="">Prov.</option>
                <option value="NA">NA</option>
                <option value="SA">SA</option>
                <option value="AV">AV</option>
            </select>
        </div>
    </div>

    <div class="input-row">
        <div class="input-icon"><span>📱</span><input type="tel" id="telefono" placeholder="Cellulare"></div>
        <div class="input-icon"><span>☎️</span><input type="tel" id="telefono_fisso" placeholder="Fisso (opz)"></div>
    </div>

    <div class="input-row">
        <div class="input-icon">
            <span>🔥</span>
            <select id="marcaSelect" onchange="resetErrori(); populateErrorList();">
                <option value="">Marca</option>
                <option value="MCZ">MCZ</option>
                <option value="PALAZZETTI">PALAZZETTI</option>
                <option value="RAVELLI">RAVELLI</option>
                <option value="MORETTI DESIGN">MORETTI DESIGN</option>
                <option value="PEGASO">PEGASO</option>
                <option value="RED">RED</option>
                <option value="BRISACH">BRISACH</option>
                <option value="CADEL">CADEL</option>
                <option value="FREEPOINT">FREEPOINT</option>
                <option value="ROYAL">ROYAL</option>
                <option value="Elledì">Elledì</option>
                <option value="Karmek One">Karmek One</option>
                <option value="Lincar">Lincar</option>
                <option value="Altro">Altro...</option>
            </select>
        </div>
        <div class="input-icon"><span>⚙️</span><input type="text" id="modello" placeholder="Modello"></div>
    </div>

    <div class="input-group" id="marcaAltroGroup" style="display:none;"><input type="text" id="marcaAltro" placeholder="Specifica marca"></div>

    <div class="input-group">
        <div class="input-icon">
            <span>🧰</span>
            <select id="tipoIntervento">
                <option value="">Tipologia intervento</option>
                <option value="Manutenzione">Manutenzione Ordinaria</option>
                <option value="Riparazione">Riparazione Guasto</option>
                <option value="Prima accensione">Prima accensione</option>
            </select>
        </div>
    </div>

    <div id="sezioneProblemi">
        <div class="input-group">
            <div class="input-icon">
                <span>🛠️</span>
                <select id="problemaSelect">
                    <option value="">Seleziona problema</option>
                    <option value="Errore sul display">Errore sul display ⚠️</option>
                    <option value="Stufa non si accende">Stufa non si accende</option>
                    <option value="Vetro subito nero">Vetro subito nero</option>
                    <option value="Rumore anomalo">Rumore anomalo</option>
                    <option value="Si spegne da sola">Si spegne da sola</option>
                    <option value="Non carica pellet">Non carica pellet</option>
                    <option value="Altro">Altro (specifica nelle note)</option>
                </select>
            </div>
        </div>

        <div class="input-group" id="erroriDisplayGroup" style="display:none;">
            <div class="input-icon">
                <span>📟</span>
                <select id="listaErrori">
                    </select>
            </div>
        </div>

        <div class="input-group" id="altroBox" style="display:none;">
            <textarea id="problemaNote" placeholder="Aggiungi dettagli qui..."></textarea>
        </div>
    </div>

    <button id="btn">INVIA SU WHATSAPP</button>

    <div class="preview-box" id="previewBox">
        <div id="previewContent">Compila il modulo per vedere l'anteprima...</div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="box">
        <h3>Conferma Invio</h3>
        <p style="margin:15px 0; color:#aaa;">Vuoi inviare la richiesta?</p>
        <div class="modal-btns">
            <button class="no" id="annulla">Modifica</button>
            <button class="ok" id="conferma">Invia Ora</button>
        </div>
    </div>
</div>

<script>
    const databaseComuni = {"Napoli":"NA","Acerra":"NA","Afragola":"NA","Casoria":"NA","Pozzuoli":"NA","Giugliano":"NA","Salerno":"SA","Angri":"SA","Battipaglia":"SA","Scafati":"SA","Nocera Inferiore":"SA","Avellino":"AV","Ariano Irpino":"AV","Solofra":"AV"};

    const dbErrori = {
        "MCZ": ["A01-Mancata Accensione","A02-Anomalia Fuoco","A03-Sicurezza Serbatoio","A04-Alta Temp Fumi","A05-Ostruzione/Press","A08-Ventilatore Fumi","A09-Sonda Fumi","A11-Motoriduttore","PELLET-Finito","SERVICE-Manutenzione"],
        "PALAZZETTI": ["E101-Accensione","E104-Sonda Fumi","E108-Sicurezza","E109-Pressione","E110-Sonda Amb","A001-Fine Pellet","A002-Manutenzione","SCOPINA-Pulizia"],
        "RAVELLI": ["AL01-Blackout","AL02-Sonda Fumi","AL03-Sovratemp Fumi","AL05-Accensione","AL06-No Pellet","AL07-Termostato","AL08-Depressione","AL12-Encoder","AL13-Flusso Aria","SERVICE-Manutenzione"],
        "MORETTI DESIGN": ["ER01-Termostato","ER02-Pressostato","ER05-Alta Temp Fumi","ER12-Accensione","ER15-Blackout","SERV-Manutenzione"],
        "CADEL": ["AL1-Blackout","AL2-Sonda Fumi","AL5-Accensione","AL6-No Pellet","AL8-Pressione","SERVICE-Manutenzione"],
        "FREEPOINT": ["AL1-Blackout","AL2-Sonda Fumi","AL5-Accensione","AL6-No Pellet","AL8-Depressione"],
        "RED": ["A01-Accensione","A02-Fuoco","A05-Pressione","A09-Sonda Fumi"],
        "ROYAL": ["E101-Accensione","E108-Sicurezza","E109-Pressione","A002-Manutenzione"]
    };

    const erroriGenerici = ["AL 1-Blackout","AL 2-Sonda Fumi","AL 5-Accensione","AL 6-No Pellet","AL 8-Depressione","SERVICE-Manutenzione"];

    const inputIds = ["nomeCognome","indirizzo","comune","provincia","telefono","telefono_fisso","marcaSelect","marcaAltro","modello","tipoIntervento","problemaSelect","listaErrori","problemaNote"];

    window.onload = () => {
        setupComuni();
        loadData();
        populateErrorList();
        updateUI();
        inputIds.forEach(id => {
            document.getElementById(id).addEventListener('input', updateUI);
            document.getElementById(id).addEventListener('change', updateUI);
        });
    };

    function setupComuni() {
        const dl = document.getElementById("listaComuni");
        Object.keys(databaseComuni).forEach(c => {
            let o = document.createElement("option"); o.value = c; dl.appendChild(o);
        });
    }

    function autoCompleteProvincia() {
        const c = document.getElementById("comune").value;
        if(databaseComuni[c]) document.getElementById("provincia").value = databaseComuni[c];
    }

    function resetErrori() {
        document.getElementById("listaErrori").value = "";
        document.getElementById("problemaSelect").value = "";
    }

    function populateErrorList() {
        const marca = document.getElementById("marcaSelect").value;
        const lista = document.getElementById("listaErrori");
        lista.innerHTML = '<option value="">Scegli l\'allarme...</option>';
        const err = dbErrori[marca] || erroriGenerici;
        err.forEach(e => {
            let o = document.createElement("option"); o.value = e; o.textContent = e; lista.appendChild(o);
        });
    }

    function updateUI() {
        const vals = {};
        inputIds.forEach(id => {
            const el = document.getElementById(id);
            vals[id] = el.value;
            localStorage.setItem(id, el.value);
        });

        document.getElementById("marcaAltroGroup").style.display = (vals.marcaSelect === "Altro") ? "block" : "none";
        document.getElementById("erroriDisplayGroup").style.display = (vals.problemaSelect === "Errore sul display") ? "block" : "none";
        document.getElementById("altroBox").style.display = (vals.problemaSelect === "Altro" || vals.problemaSelect === "Errore sul display") ? "block" : "none";
        document.getElementById("sezioneProblemi").style.display = (vals.tipoIntervento === "Prima accensione") ? "none" : "block";

        let filled = 0;
        const req = ["nomeCognome","comune","provincia","telefono","marcaSelect","tipoIntervento"];
        req.forEach(r => { if(document.getElementById(r).value) filled++; });
        const p = Math.round((filled / req.length) * 100);
        document.getElementById("progressBar").style.width = p + "%";
        document.getElementById("progressBar").innerText = p + "%";

        const mFinal = vals.marcaSelect === "Altro" ? vals.marcaAltro : vals.marcaSelect;
        const pFinal = vals.problemaSelect === "Errore sul display" ? "Err: " + vals.listaErrori : vals.problemaSelect;

        document.getElementById("previewContent").innerHTML = `
            <b>Cliente:</b> ${vals.nomeCognome || '-'}<br>
            <b>Città:</b> ${vals.comune || '-'} (${vals.provincia || '-'})<br>
            <b>Stufa:</b> ${mFinal || '-'} ${vals.modello ? '('+vals.modello+')' : ''}<br>
            <b>Intervento:</b> ${vals.tipoIntervento || '-'}<br>
            ${vals.tipoIntervento !== "Prima accensione" ? `<b>Problema:</b> ${pFinal || '-'}` : ''}
        `;
    }

    function loadData() {
        inputIds.forEach(id => {
            const v = localStorage.getItem(id);
            if(v) document.getElementById(id).value = v;
        });
    }

    document.getElementById("btn").onclick = () => {
        if(!document.getElementById("nomeCognome").value || !document.getElementById("marcaSelect").value) {
            alert("Compila i campi principali!"); return;
        }
        document.getElementById("modal").style.display = "flex";
    };

    document.getElementById("annulla").onclick = () => { document.getElementById("modal").style.display = "none"; };

    document.getElementById("conferma").onclick = () => {
        const v = {}; inputIds.forEach(id => v[id] = document.getElementById(id).value);
        const mFinal = v.marcaSelect === "Altro" ? v.marcaAltro : v.marcaSelect;
        let prob = v.problemaSelect;
        if(prob === "Errore sul display") prob = "Errore: " + v.listaErrori;
        
        const msg = `*RICHIESTA ASSISTENZA*\n👤 *Cliente:* ${v.nomeCognome}\n📍 *Indirizzo:* ${v.indirizzo}\n🏙️ *Comune:* ${v.comune} (${v.provincia})\n📱 *Tel:* ${v.telefono}\n🔥 *Stufa:* ${mFinal} ${v.modello ? '('+v.modello+')' : ''}\n🧰 *Intervento:* ${v.tipoIntervento}\n${v.tipoIntervento !== 'Prima accensione' ? '🛠️ *Problema:* '+prob : ''}\n📝 *Note:* ${v.problemaNote}\n📅 *Data:* ${new Date().toLocaleDateString()}`;
        
        window.open("https://wa.me/393394245508?text=" + encodeURIComponent(msg), "_blank");
        document.getElementById("modal").style.display = "none";
    };
</script>

</body>
</html>
