        /* --- SPLASH SCREEN STILE NETFLIX (AGGIUNTO) --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-content { text-align: center; width: 280px; }
        .splash-logo {
            width: 100%;
            height: auto;
            animation: netflixIntro 2s ease-out forwards;
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.4));
        }
        @keyframes netflixIntro {
            0% { transform: scale(0.7); opacity: 0; filter: brightness(0.5); }
            50% { opacity: 1; filter: brightness(1.2); }
            100% { transform: scale(1.1); opacity: 1; filter: brightness(1); }
        }
        .splash-bar-container {
            width: 60%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            margin: 20px auto 0;
            border-radius: 10px;
            overflow: hidden;
        }
        .splash-bar-progress {
            width: 0;
            height: 100%;
            background: #ef4444;
            animation: loadingBar 2s linear forwards;
        }
        @keyframes loadingBar { 0% { width: 0%; } 100% { width: 100%; } }
        .splash-hidden { opacity: 0 !important; visibility: hidden !important; }

    const ids = ["nomeCognome", "indirizzo", "comune", "provincia", "telefono", "telefono_fisso", "marcaSelect", "marcaAltro", "modello", "tipoIntervento", "problemaSelect", "listaErrori", "problemaNote"];

    window.onload = function() {
        document.getElementById("data").value = new Date().toLocaleDateString('it-IT');
        const dl = document.getElementById("listaComuni");
        Object.keys(comuniDB).sort().forEach(comune => {
            let opt = document.createElement("option"); opt.value = comune; dl.appendChild(opt);
        });
        loadLocalStorage(); populateErrorList(); updateUI();
    };

    function autoProvincia() {
        const valComune = document.getElementById("comune").value;
        if(comuniDB[valComune]) { document.getElementById("provincia").value = comuniDB[valComune]; }
    }

    function populateErrorList() {
        const marca = document.getElementById("marcaSelect").value;
        const listaErrori = document.getElementById("listaErrori");
        const errori = dbErrori[marca] ? dbErrori[marca] : erroriGenerici;
        const currentSaved = localStorage.getItem("listaErrori");
        listaErrori.innerHTML = '<option value="">Seleziona l\'allarme...</option>';
        errori.forEach(err => {
            const opt = document.createElement("option"); opt.value = err; opt.textContent = err; listaErrori.appendChild(opt);
        });
        if(currentSaved) listaErrori.value = currentSaved;
    }

    function saveLocalStorage() { ids.forEach(id => { const el = document.getElementById(id); if(el) localStorage.setItem(id, el.value); }); }
    function loadLocalStorage() { ids.forEach(id => { const savedValue = localStorage.getItem(id); const el = document.getElementById(id); if(savedValue !== null && el) el.value = savedValue; }); }

    function updateUI() {
        saveLocalStorage();
        const fields = {
            cliente: document.getElementById("nomeCognome").value,
            indirizzo: document.getElementById("indirizzo").value,
            comune: document.getElementById("comune").value,
            provincia: document.getElementById("provincia").value,
            telefono: document.getElementById("telefono").value,
            marca: document.getElementById("marcaSelect").value,
            tipo: document.getElementById("tipoIntervento").value
        };

        document.getElementById("marcaAltroGroup").style.display = (fields.marca === "Altro") ? "block" : "none";
        const probSel = document.getElementById("problemaSelect").value;
        document.getElementById("erroriDisplayGroup").style.display = (probSel === "Errore sul display") ? "block" : "none";
        document.getElementById("altroBox").style.display = (probSel === "Altro" || probSel === "Errore sul display") ? "block" : "none";
        document.getElementById("sezioneProblemi").style.display = (fields.tipo === "Prima accensione") ? "none" : "block";

        let completed = 0;
        if(fields.cliente) completed++; if(fields.indirizzo) completed++; if(fields.telefono) completed++; if(fields.marca) completed++; if(fields.tipo) completed++;

        const percent = Math.round((completed / 5) * 100);
        const bar = document.getElementById("progressBar");
        bar.style.width = percent + "%"; bar.innerText = percent + "%";
        if(percent < 50) bar.style.background = "#ef4444"; else if(percent < 100) bar.style.background = "#f59e0b"; else bar.style.background = "#22c55e";

        const marcaFinale = fields.marca === "Altro" ? document.getElementById("marcaAltro").value : fields.marca;
        const modF = document.getElementById("modello").value;
        const erroreScelto = document.getElementById("listaErrori").value;
        const problemaFinale = probSel === "Errore sul display" ? "Errore: " + erroreScelto : probSel;

        document.getElementById("previewContent").innerHTML = `<b>Cliente:</b> ${fields.cliente || '-'}<br><b>Città:</b> ${fields.comune || '-'} (${fields.provincia || '-'})<br><b>Cell:</b> ${fields.telefono || '-'}<br><b>Stufa:</b> ${marcaFinale || '-'} ${modF ? '('+modF+')' : ''}<br><b>Intervento:</b> ${fields.tipo || '-'}<br>${fields.tipo !== "Prima accensione" ? `<b>Problema:</b> ${problemaFinale || '-'}` : ''}`;
    }

    let messaggioGlobal = "";
    document.getElementById("btn").onclick = function() {
        const cliente = document.getElementById("nomeCognome").value.trim();
        const indirizzo = document.getElementById("indirizzo").value.trim();
        const comune = document.getElementById("comune").value.trim();
        const provincia = document.getElementById("provincia").value;
        const telefono = document.getElementById("telefono").value.trim();
        const marca = document.getElementById("marcaSelect").value === "Altro" ? document.getElementById("marcaAltro").value : document.getElementById("marcaSelect").value;
        const tipo = document.getElementById("tipoIntervento").value;
        if(!cliente || !comune || !telefono || !marca || !tipo) { alert("Compila i campi obbligatori!"); return; }
        let prob = document.getElementById("problemaSelect").value;
        if(prob === "Errore sul display") prob = "Errore: " + document.getElementById("listaErrori").value;
        const note = document.getElementById("problemaNote").value;
        const mod = document.getElementById("modello").value;
        messaggioGlobal = `*RICHIESTA INTERVENTO*\n*C.A.T. SERVICE*\n\n👤 *Cliente:* ${cliente}\n📍 *Indirizzo:* ${indirizzo}\n🏙️ *Comune:* ${comune} (${provincia})\n📱 *Cell:* ${telefono}\n🔥 *Stufa:* ${marca} ${mod ? "("+mod+")" : ""}\n🧰 *Intervento:* ${tipo}\n${tipo !== "Prima accensione" ? "🛠️ *Problema:* "+prob+(note ? " ("+note+")" : "")+"\n" : ""}📅 *Data:* ${document.getElementById("data").value}`;
        document.getElementById("modal").style.display = "flex";
    };

    document.getElementById("annulla").onclick = function() { document.getElementById("modal").style.display = "none"; };
    document.getElementById("conferma").onclick = function() {
        window.open("https://wa.me/393394245508?text=" + encodeURIComponent(messaggioGlobal), "_blank");
        document.getElementById("modal").style.display = "none";
        localStorage.clear();
        ids.forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = ""; });
        updateUI();
    };
</script>
