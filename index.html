<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT Service - Prenotazione</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}

body{
    background:url('./sfondo.jpg') no-repeat center center;
    background-size:cover;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:20px 0;
    color:white;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
    top:0;left:0;
    z-index:-1;
}

/* HEADER LOGO */
.header{
    text-align:center;
    margin-bottom:15px;
}
.header img{
    max-width:140px;
    display:block;
    margin:0 auto;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    padding:25px;
    border-radius:14px;
    box-shadow:0 5px 25px rgba(0,0,0,0.4);
}

/* TITOLI */
h2{text-align:center;color:#c62828;margin-bottom:20px;font-size:22px;}

/* INPUT E SELECT */
input, select{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border-radius:10px;
    border:none;
    font-size:16px;
    outline:none;
    background:rgba(255,255,255,0.15);
    color:white;
    transition:0.3s;
}
input::placeholder{color:#ddd;}
input:focus, select:focus{background:rgba(255,255,255,0.25);transform:scale(1.02);}

/* LABEL */
label{
    font-size:14px;
    margin-bottom:5px;
    display:block;
    color:#fff;
}

/* PULSANTE WHATSAPP ANIMATO */
button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(45deg,#22c55e,#16a34a);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    animation:pulse 2s infinite;
}

/* ICONA WHATSAPP ANIMATA */
.whatsapp-icon{
    width:24px;
    height:24px;
    animation:iconBounce 1.2s infinite;
}

/* EFFETTI */
@keyframes iconBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes pulse{0%{box-shadow:0 0 10px rgba(34,197,94,0.6);}50%{box-shadow:0 0 25px rgba(34,197,94,1);}100%{box-shadow:0 0 10px rgba(34,197,94,0.6);}}
button::before{
    content:"";
    position:absolute;
    width:200%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
    top:0;left:-100%;
    animation:shine 3s infinite;
}
@keyframes shine{0%{left:-100%;}50%{left:100%;}100%{left:100%;}}
button:active{transform:scale(0.95);}

/* FIAMMA SCINTILLANTE */
.fire{
    display:inline-block;
    font-size:18px;
    animation:fireContinuous 1s infinite alternate;
}
@keyframes fireContinuous{
    0% { transform: scale(1.1) rotate(-5deg); text-shadow:0 0 5px #ff9800,0 0 15px #ff5722,0 0 25px #ff0000;}
    25% { transform: scale(1.3) rotate(5deg); text-shadow:0 0 10px #ff9800,0 0 25px #ff5722,0 0 40px #ff0000;}
    50% { transform: scale(1.2) rotate(-3deg); text-shadow:0 0 7px #ff9800,0 0 20px #ff5722,0 0 35px #ff0000;}
    75% { transform: scale(1.35) rotate(4deg); text-shadow:0 0 12px #ff9800,0 0 28px #ff5722,0 0 45px #ff0000;}
    100% { transform: scale(1.1) rotate(-5deg); text-shadow:0 0 5px #ff9800,0 0 15px #ff5722,0 0 25px #ff0000;}
}

/* MODALE */
.modal{
    position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);top:0;left:0;
    display:none;justify-content:center;align-items:center;
}
.box{
    background:rgba(0,0,0,0.9);
    color:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    width:90%;
    max-width:320px;
}
.box button{width:45%;padding:12px;margin:5px;border:none;border-radius:6px;font-weight:bold;}
.ok{background:#22c55e;color:white;}
.no{background:#555;color:white;}

.success{
    display:none;text-align:center;color:#2e7d32;margin-top:10px;font-weight:bold;
}

/* FOOTER */
.footer{text-align:center;color:white;font-size:13px;padding:15px;}

/* RESPONSIVO */
@media (max-width:480px){
    h2{font-size:20px;}
    input, select{font-size:15px;padding:12px;}
    button{font-size:16px;padding:12px;}
    .fire{font-size:16px;}
    .header img{max-width:100px;}
}
</style>
</head>

<body>

<div class="header">
    <img src="./logo.png" alt="Logo CAT Service">
</div>

<div class="container">
    <h2>Prenota il tuo intervento</h2>

    <input type="text" id="nome" placeholder="Nome" required>
    <input type="text" id="cognome" placeholder="Cognome" required>
    <input type="text" id="indirizzo" placeholder="Indirizzo completo" required>
    <input type="tel" id="telefono" placeholder="Telefono" required>
    <input type="tel" id="telefono_fisso" placeholder="Telefono fisso (facoltativo)">
    <input type="text" id="marca" placeholder="Marca stufa" required>
    <input type="text" id="modello" placeholder="Modello stufa (facoltativo)">
    <select id="tipoIntervento" required>
        <option value="">Tipologia intervento</option>
        <option value="Manutenzione">Manutenzione</option>
        <option value="Riparazione">Riparazione</option>
        <option value="Prima accensione">Prima accensione</option>
    </select>

    <label>Data prenotazione intervento:</label>
    <input type="text" id="data" readonly>

    <!-- PULSANTE WHATSAPP -->
    <button id="btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="whatsapp-icon" alt="WhatsApp">
        Prenota su WhatsApp
    </button>

    <!-- FIAMMA SOTTO PULSANTE -->
    <div style="text-align:center;margin-top:12px;">
        <span class="fire">🔥 CAT Service di Fabio Campitiello</span>
    </div>

    <div class="success" id="successMsg">
        ✅ Prenotazione inviata! Apri WhatsApp e premi INVIA
    </div>
</div>

<!-- MODALE -->
<div class="modal" id="modal">
    <div class="box">
        <h3>Conferma</h3>
        <p>Inviare la prenotazione su WhatsApp?</p>
        <button class="no" id="annulla">Annulla</button>
        <button class="ok" id="conferma">Invia</button>
    </div>
</div>

<div class="footer">
    C.A.T. Service
</div>

<script>
window.onload=function(){
    let oggi = new Date();
    let g = String(oggi.getDate()).padStart(2,'0');
    let m = String(oggi.getMonth()+1).padStart(2,'0');
    let a = oggi.getFullYear();
    document.getElementById("data").value = g+"/"+m+"/"+a;
};

let messaggio="";
document.getElementById("btn").onclick=function(){
    let nome=document.getElementById("nome").value;
    let cognome=document.getElementById("cognome").value;
    let indirizzo=document.getElementById("indirizzo").value;
    let telefono=document.getElementById("telefono").value;
    let telefonoFisso=document.getElementById("telefono_fisso").value;
    let marca=document.getElementById("marca").value;
    let modello=document.getElementById("modello").value;
    let tipoIntervento=document.getElementById("tipoIntervento").value;
    let data=document.getElementById("data").value;

    if(!nome||!cognome||!indirizzo||!telefono||!marca||!tipoIntervento){
        alert("Compila tutti i campi obbligatori!");
        return;
    }

    messaggio=`🔥 Prenotazione CAT Service
Nome: ${nome}
Cognome: ${cognome}
Indirizzo: ${indirizzo}
Telefono: ${telefono}
Telefono fisso: ${telefonoFisso}
Marca stufa: ${marca}
Modello stufa: ${modello}
Tipo intervento: ${tipoIntervento}
Data prenotazione intervento: ${data}`;

    document.getElementById("modal").style.display="flex";
}

document.getElementById("annulla").onclick=function(){
    document.getElementById("modal").style.display="none";
}

document.getElementById("conferma").onclick=function(){
    let url="https://wa.me/393394245508?text="+encodeURIComponent(messaggio);
    window.open(url,"_blank");
    document.getElementById("modal").style.display="none";
    document.getElementById("successMsg").style.display="block";
}
</script>

</body>
</html>
