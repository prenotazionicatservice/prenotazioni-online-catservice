<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C.A.T. SERVICE - Prenotazione</title>

    <style>
        /* RESET GENERALE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #200505;
            background: radial-gradient(circle at 50% 50%, #450a0a, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 15px;
            color: #fff;
        }

        /* CONTENITORE PRINCIPALE */
        .container {
            width: 100%;
            max-width: 450px; /* Larghezza perfetta per PC e Mobile */
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* Fix per iPhone */
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-img {
            width: 160px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.4));
        }

        h2 {
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 5px;
        }

        .sub-logo {
            color: #ef4444;
            font-size: 14px;
            font-weight: 400;
        }

        /* GRUPPI DI INPUT */
        .input-group {
            margin-bottom: 15px;
            width: 100%;
        }

        label {
            display: block;
            font-size: 11px;
            color: #ef4444;
            text-transform: uppercase;
            margin-bottom: 5px;
            padding-left: 5px;
            font-weight: bold;
        }

        .input-icon {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .input-icon span {
            position: absolute;
            left: 12px;
            font-size: 18px;
            z-index: 5;
            pointer-events: none;
        }

        /* INPUT, SELECT, TEXTAREA */
        input, select, textarea {
            width: 100%;
            padding: 12px 15px 12px 42px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px; /* Evita zoom automatico su iPhone */
            transition: 0.3s;
            -webkit-appearance: none; /* Rimuove stili default iOS */
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: #ef4444;
        }

        /* FIX PER SELECT SU MOBILE */
        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ef4444%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 12px auto;
            padding-right: 30px;
        }

        textarea {
            min-height: 80px;
            resize: none;
        }

        /* BOTTONE */
        button#btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #b91c1c, #ef4444);
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(185, 28, 28, 0.4);
        }

        button#btn:active {
            transform: scale(0.98);
        }

        .privacy-notice {
            font-size: 10px;
            color: #aaa;
            text-align: center;
            margin: 15px 0;
            line-height: 1.4;
        }

        .success-info {
            text-align: center;
            color: #ef4444;
            font-weight: bold;
            font-size: 13px;
            margin-top: 10px;
        }

        /* MODALE */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .box {
            background: #111;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ef4444;
            width: 100%;
            max-width: 320px;
        }

        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .ok { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; flex: 1; font-weight: bold; }
        .no { background: #444; color: white; border: none; padding: 12px; border-radius: 10px; flex: 1; }

        /* PREVIEW TESTO */
        #previewBox p {
            background: #fff;
            color: #000;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 10px;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="logo-container">
        <img src="logo.png" alt="Logo C.A.T. Service" class="logo-img">
        <h2>C.A.T. SERVICE</h2>
        <div class="sub-logo">di Fabio Campitiello</div>
    </div>

    <div class="input-group">
        <div class="input-icon"><span>👤</span><input type="text" id="nome" placeholder="Nome"></div>
    </div>
    <div class="input-group">
        <div class="input-icon"><span>👤</span><input type="text" id="cognome" placeholder="Cognome"></div>
    </div>
    <div class="input-group">
        <div class="input-icon"><span>📍</span><input type="text" id="indirizzo" placeholder="Indirizzo completo"></div>
    </div>
    <div class="input-group">
        <div class="input-icon"><span>📱</span><input type="tel" id="telefono" placeholder="Telefono cellulare"></div>
    </div>
    <div class="input-group">
        <div class="input-icon"><span>☎️</span><input type="tel" id="telefono_fisso" placeholder="Telefono fisso (facoltativo)"></div>
    </div>

    <div class="input-group">
        <div class="input-icon">
            <span>🔥</span>
            <select id="marcaSelect">
                <option value="">Marca Stufa</option>
                <option value="MCZ">MCZ</option>
                <option value="PALAZZETTI">PALAZZETTI</option>
                <option value="RAVELLI">RAVELLI</option>
                <option value="MORETTI DESIGN">MORETTI DESIGN</option>
                <option value="PEGASO">PEGASO</option>
                <option value="RED">RED</option>
                <option value="BRISACH">BRISACH</option>
                <option value="CADEL">CADEL</option>
                <option value="FREEPOINT">FREEPOINT</option>
                <option value="ROYAL">ROYAL</option>
                <option value="Elledì">Elledì</option>
                <option value="Altro">Altro (specifica)</option>
            </select>
        </div>
    </div>

    <div class="input-group" id="marcaAltroGroup" style="display:none;">
        <div class="input-icon"><span>✍️</span><input type="text" id="marcaAltro" placeholder="Specifica marca"></div>
    </div>

    <div class="input-group">
        <div class="input-icon"><span>⚙️</span><input type="text" id="modello" placeholder="Modello stufa (facoltativo)"></div>
    </div>

    <div class="input-group">
        <div class="input-icon">
            <span>🧰</span>
            <select id="tipoIntervento">
                <option value="">Tipologia intervento</option>
                <option value="Manutenzione">Manutenzione</option>
                <option value="Riparazione">Riparazione</option>
                <option value="Prima accensione">Prima accensione</option>
            </select>
        </div>
    </div>

    <div id="sezioneProblemi">
        <div class="input-group">
            <label>Problematica</label>
            <div class="input-icon">
                <span>🛠️</span>
                <select id="problemaSelect">
                    <option value="">Seleziona problema</option>
                    <option value="Errore sul display">Errore sul display ⚠️</option>
                    <option value="Stufa non si accende">Stufa non si accende</option>
                    <option value="Si spegne da sola">Si spegne da sola</option>
                    <option value="Non carica pellet">Non carica pellet</option>
                    <option value="Altro">Altro (specifica sotto)</option>
                </select>
            </div>
        </div>

        <div class="input-group" id="erroriDisplayGroup" style="display:none;">
            <label>Tipo di errore</label>
            <div class="input-icon">
                <span>📟</span>
                <select id="listaErrori">
                    <option value="">Seleziona l'allarme...</option>
                    <option value="AL 1 - Blackout">AL 1 - Blackout</option>
                    <option value="AL 2 - Sonda Fumi">AL 2 - Sonda Fumi</option>
                    <option value="AL 3 - Hot Fumi">AL 3 - Hot Fumi</option>
                    <option value="AL 4 - Aspiratore">AL 4 - Guasto Estrattore</option>
                    <option value="AL 5 - No Accensione">AL 5 - No Accensione</option>
                    <option value="AL 6 - No Pellet">AL 6 - No Pellet</option>
                    <option value="AL 7 - Termico">AL 7 - Sicurezza Termica</option>
                    <option value="AL 8 - No Depressione">AL 8 - No Depressione</option>
                    <option value="AL 9 - Coclea">AL 9 - Blocco Coclea</option>
                    <option value="Service">Scritta SERVICE</option>
                    <option value="Altro">Altro errore</option>
                </select>
            </div>
        </div>

        <div class="input-group" id="altroBox" style="display:none;">
            <label>Descrizione guasto</label>
            <div class="input-icon">
                <span>📝</span>
                <textarea id="problemaNote" placeholder="Descrivi il guasto"></textarea>
            </div>
        </div>
    </div>

    <div class="input-group">
        <label>Data di oggi</label>
        <input type="text" id="data" readonly style="text-align:center; color:#ef4444; font-weight:bold; background:rgba(0,0,0,0.2);">
    </div>

    <div class="privacy-notice">
        L'invio acconsente al trattamento dei dati (GDPR) per l'assistenza tecnica.
    </div>

    <button id="btn">Prenota su WhatsApp</button>

    <div id="previewBox" style="display:none; margin-top:15px;">
        <p id="previewText" style="white-space:pre-line;"></p>
    </div>

    <div class="success-info">
        ✅ Verrai indirizzato a WhatsApp
    </div>
</div>

<div class="modal" id="modal">
    <div class="box">
        <h3>Conferma Inviata</h3>
        <p>Vuoi procedere con l'invio del messaggio?</p>
        <div class="modal-btns">
            <button class="no" id="annulla">Modifica</button>
            <button class="ok" id="conferma">Invia</button>
        </div>
    </div>
</div>

<script>
    // Imposta Data
    window.onload = function() {
        let oggi = new Date();
        document.getElementById("data").value = oggi.toLocaleDateString('it-IT');
    };

    const tipoSelect = document.getElementById("tipoIntervento");
    const sezioneProblemi = document.getElementById("sezioneProblemi");
    const problemaSelect = document.getElementById("problemaSelect");
    const erroriDisplayGroup = document.getElementById("erroriDisplayGroup");
    const listaErrori = document.getElementById("listaErrori");
    const altroBox = document.getElementById("altroBox");
    const marcaSelect = document.getElementById("marcaSelect");
    const marcaAltroGroup = document.getElementById("marcaAltroGroup");
    const marcaAltroInput = document.getElementById("marcaAltro");

    tipoSelect.onchange = function() {
        sezioneProblemi.style.display = (this.value === "Prima accensione") ? "none" : "block";
    };

    marcaSelect.onchange = function() {
        marcaAltroGroup.style.display = (this.value === "Altro") ? "block" : "none";
    };

    problemaSelect.onchange = function() {
        erroriDisplayGroup.style.display = (this.value === "Errore sul display") ? "block" : "none";
        altroBox.style.display = (this.value === "Altro" || this.value === "Errore sul display") ? "block" : "none";
    };

    let messaggioGlobal = "";

    document.getElementById("btn").onclick = function() {
        let nome = document.getElementById("nome").value.trim();
        let cognome = document.getElementById("cognome").value.trim();
        let indirizzo = document.getElementById("indirizzo").value.trim();
        let telefono = document.getElementById("telefono").value.trim();
        let marca = marcaSelect.value === "Altro" ? marcaAltroInput.value : marcaSelect.value;
        let tipo = tipoSelect.value;

        if(!nome || !cognome || !indirizzo || !telefono || !marca || !tipo) {
            alert("Compila i campi obbligatori.");
            return;
        }

        let prob = problemaSelect.value;
        if(prob === "Errore sul display") prob = "Errore: " + listaErrori.value;
        let note = document.getElementById("problemaNote").value;

        messaggioGlobal = `*RICHIESTA INTERVENTO*\n*C.A.T. SERVICE*\n\n👤 *Cliente:* ${nome} ${cognome}\n📍 *Indirizzo:* ${indirizzo}\n📱 *Cell:* ${telefono}\n🔥 *Stufa:* ${marca}\n🧰 *Intervento:* ${tipo}\n🛠️ *Problema:* ${prob}${note ? " ("+note+")" : ""}\n📅 *Data:* ${document.getElementById("data").value}`;

        document.getElementById("previewText").innerText = messaggioGlobal;
        document.getElementById("previewBox").style.display = "block";
        document.getElementById("modal").style.display = "flex";
    };

    document.getElementById("annulla").onclick = function() {
        document.getElementById("modal").style.display = "none";
    };

    document.getElementById("conferma").onclick = function() {
        let url = "https://wa.me/393394245508?text=" + encodeURIComponent(messaggioGlobal);
        window.open(url, "_blank");
        document.getElementById("modal").style.display = "none";
    };
</script>

</body>
</html>
