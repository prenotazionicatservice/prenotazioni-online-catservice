<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C.A.T. SERVICE - Prenotazione</title>
    <style>
        /* RESET E STILE ORIGINALE INTEGRALE */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #200505; background: radial-gradient(circle at 50% 50%, #450a0a, #000000); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 80px 15px 40px 15px; color: #fff; }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid rgba(239, 68, 68, 0.4); z-index: 1000; }
        .nav-content { display: flex; align-items: center; gap: 12px; }
        .mini-logo { height: 35px; width: auto; filter: drop-shadow(0 0 5px #ef4444); }
        .nav-title { font-weight: bold; font-size: 14px; letter-spacing: 1px; color: #ef4444; text-transform: uppercase; }
        .container { width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; padding: 25px; border: 1px solid rgba(239, 68, 68, 0.3); animation: openingGlow 1.2s ease-out forwards; }
        @keyframes openingGlow { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); box-shadow: 0 15px 35px rgba(0,0,0,0.6); } }
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-img { width: 220px; max-width: 100%; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.5)); animation: logoPulse 3s infinite ease-in-out; }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 20px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .progress-bar { height: 100%; width: 0%; background: #ef4444; transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; width: 100%; }
        .input-icon { position: relative; display: flex; align-items: center; width: 100%; }
        .input-icon span { position: absolute; left: 12px; font-size: 18px; z-index: 5; pointer-events: none; }
        input, select, textarea { width: 100%; padding: 12px 15px 12px 42px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; font-size: 16px; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #ef4444; background: rgba(255, 255, 255, 0.15); }
        button#btn { position: relative; width: 100%; padding: 20px; margin-top: 15px; border: none; border-radius: 15px; background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); color: white; font-size: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 10px; overflow: hidden; box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4); animation: pulse-green 2s infinite; }
        button#btn::after { content: ''; position: absolute; top: -50%; left: -60%; width: 20%; height: 200%; background: rgba(255, 255, 255, 0.4); transform: rotate(30deg); animation: shimmer 3s infinite; }
        @keyframes shimmer { 0% { left: -60%; } 20% { left: 120%; } 100% { left: 120%; } }
        @keyframes pulse-green { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }
        .preview-box { margin-top: 10px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px dashed rgba(239, 68, 68, 0.5); font-size: 13px; line-height: 1.6; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .box { background: #111; padding: 25px; border-radius: 20px; text-align: center; border: 2px solid #ef4444; width: 100%; max-width: 320px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .ok { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; flex: 1; font-weight: bold; }
        .no { background: #444; color: white; border: none; padding: 12px; border-radius: 10px; flex: 1; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-content">
        <img src="logo.PNG" class="mini-logo" onerror="this.src='logo.png';">
        <span class="nav-title">C.A.T. Service</span>
    </div>
</nav>

<div class="container">
    <div class="logo-container">
        <img src="logo.PNG" class="logo-img" onerror="this.src='logo.png';">
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <div class="input-group">
        <div class="input-icon"><span>👤</span><input type="text" id="nomeCognome" placeholder="Nome e Cognome" oninput="updateUI()"></div>
    </div>

    <div class="input-group">
        <div class="input-icon"><span>📍</span><input type="text" id="indirizzo" placeholder="Indirizzo completo" oninput="updateUI()"></div>
    </div>

    <div class="input-row">
        <div class="input-icon">
            <span>🏙️</span>
            <input type="text" id="comune" list="listaComuni" placeholder="Comune" oninput="autoProvincia(); updateUI();">
            <datalist id="listaComuni"></datalist>
        </div>
        <div class="input-icon">
            <span>🌍</span>
            <select id="provincia" onchange="updateUI()">
                <option value="">Prov.</option>
                <option value="NA">Napoli (NA)</option>
                <option value="SA">Salerno (SA)</option>
                <option value="AV">Avellino (AV)</option>
            </select>
        </div>
    </div>

    <div class="input-row">
        <div class="input-icon"><span>📱</span><input type="tel" id="telefono" placeholder="Cellulare" oninput="updateUI()"></div>
        <div class="input-icon"><span>☎️</span><input type="tel" id="telefono_fisso" placeholder="Fisso (opz)" oninput="updateUI()"></div>
    </div>

    <div class="input-row">
        <div class="input-icon">
            <span>🔥</span>
            <select id="marcaSelect" onchange="populateErrorList(); updateUI();">
                <option value="">Marca</option>
                <option value="MCZ">MCZ</option>
                <option value="PALAZZETTI">PALAZZETTI</option>
                <option value="RAVELLI">RAVELLI</option>
                <option value="MORETTI DESIGN">MORETTI DESIGN</option>
                <option value="PEGASO">PEGASO</option>
                <option value="RED">RED</option>
                <option value="BRISACH">BRISACH</option>
                <option value="CADEL">CADEL</option>
                <option value="FREEPOINT">FREEPOINT</option>
                <option value="ROYAL">ROYAL</option>
                <option value="Elledì">Elledì</option>
                <option value="Karmek One">Karmek One</option>
                <option value="Lincar">Lincar</option>
                <option value="Altro">Altro...</option>
            </select>
        </div>
        <div class="input-icon"><span>⚙️</span><input type="text" id="modello" placeholder="Modello" oninput="updateUI()"></div>
    </div>

    <div class="input-group" id="marcaAltroGroup" style="display:none;"><input type="text" id="marcaAltro" placeholder="Specifica marca" oninput="updateUI()"></div>

    <div class="input-group">
        <div class="input-icon">
            <span>🧰</span>
            <select id="tipoIntervento" onchange="updateUI()">
                <option value="">Tipologia intervento</option>
                <option value="Manutenzione">Manutenzione</option>
                <option value="Riparazione">Riparazione</option>
                <option value="Prima accensione">Prima accensione</option>
            </select>
        </div>
    </div>

    <div id="sezioneProblemi">
        <div class="input-group"><div class="input-icon"><span>🛠️</span><select id="problemaSelect" onchange="updateUI()"><option value="">Problema...</option><option value="Errore sul display">Errore sul display ⚠️</option><option value="Stufa non si accende">Stufa non si accende</option><option value="Vetro subito nero">Vetro subito nero</option><option value="Altro">Altro (specifica sotto)</option></select></div></div>
        <div class="input-group" id="erroriDisplayGroup" style="display:none;"><div class="input-icon"><span>📟</span><select id="listaErrori" onchange="updateUI()"></select></div></div>
        <div class="input-group" id="altroBox" style="display:none;"><textarea id="problemaNote" placeholder="Dettagli..." oninput="updateUI()"></textarea></div>
    </div>

    <button id="btn">INVIA SU WHATSAPP</button>

    <div class="preview-box" id="previewBox">
        <div id="previewContent">Compila il modulo...</div>
    </div>
</div>

<div class="modal" id="modal"><div class="box"><h3>Conferma</h3><div class="modal-btns"><button class="no" id="annulla">Modifica</button><button class="ok" id="conferma">Invia</button></div></div></div>

<script>
    // DATABASE COMUNI (Estratto principali Napoli, Salerno, Avellino)
    const comuniDB = {
        "Napoli":"NA","Acerra":"NA","Afragola":"NA","Casoria":"NA","Pozzuoli":"NA","Giugliano":"NA","Pompei":"NA","Nola":"NA","Castellammare di Stabia":"NA","Ercolano":"NA","Torre del Greco":"NA",
        "Salerno":"SA","Scafati":"SA","Angri":"SA","Pagani":"SA","Nocera Inferiore":"SA","Nocera Superiore":"SA","Battipaglia":"SA","Eboli":"SA","Cava de' Tirreni":"SA","Amalfi":"SA",
        "Avellino":"AV","Atripalda":"AV","Ariano Irpino":"AV","Solofra":"AV","Mercogliano":"AV","Montoro":"AV"
    };

    const dbErrori = {
        "MCZ": ["A01 (MANCATA ACCENSIONE)", "A02 (Spegnimento anomalo fuoco)", "A03 (ALLARME SICUREZZA PELLET)", "A04 (ALLARME TEMP.FUMI)", "A05 (ALLARME PORTA APERTA/VENTO CANNA FUMARIA)", "A08 (ALLARME MOTORE FUMI)", "A09 (ALLARME SONDA FUMI)", "A11 (ALLARME MOTORIDUTTORE PELLET)", "A17 (ALLARME TEMP.ACQUA)", "SERVICE (MANUTENZIONE)"],
        "PALAZZETTI": ["E101 MANCATA ACCENSIONE", "E108 ERRORE SICUREZZA", "E109 ERRORE PRESSIONE", "E111 ERRORE SONDA FUMI", "A002 MANUTENZIONE", "SCOPINA GIALLA PULIZIA"],
        "MORETTI DESIGN": ["ER 01 SICUREZZA", "ER02 CANNA FUMARIA", "ER05 TEMP. FUMI ALTA", "ER12 ACCENSIONE FALLITA", "SERV PULIZIA"],
        "RAVELLI": ["AL01 BLACK-OUT", "AL02 SONDA FUMI", "AL05 MANCATA ACCENSIONE", "AL06 PELLET ESAURITI", "AL08 MANCA DEPRESSIONE"]
    };

    const ids = ["nomeCognome", "indirizzo", "comune", "provincia", "telefono", "telefono_fisso", "marcaSelect", "marcaAltro", "modello", "tipoIntervento", "problemaSelect", "listaErrori", "problemaNote"];

    window.onload = function() {
        const dl = document.getElementById("listaComuni");
        Object.keys(comuniDB).sort().forEach(c => { let o = document.createElement("option"); o.value = c; dl.appendChild(o); });
        loadLocalStorage();
        updateUI();
    };

    function autoProvincia() {
        const val = document.getElementById("comune").value;
        if(comuniDB[val]) document.getElementById("provincia").value = comuniDB[val];
    }

    function populateErrorList() {
        const marca = document.getElementById("marcaSelect").value;
        const lista = document.getElementById("listaErrori");
        const errori = dbErrori[marca] || ["AL 1-Blackout","AL 2-Sonda","AL 5-Accensione","AL 6-No Pellet","AL 8-Depressione","SERVICE"];
        lista.innerHTML = '<option value="">Scegli l\'allarme...</option>';
        errori.forEach(e => { let o = document.createElement("option"); o.value = e; o.textContent = e; lista.appendChild(o); });
    }

    function updateUI() {
        ids.forEach(id => { const el = document.getElementById(id); if(el) localStorage.setItem(id, el.value); });
        const f = {
            c: document.getElementById("nomeCognome").value,
            com: document.getElementById("comune").value,
            p: document.getElementById("provincia").value,
            t: document.getElementById("telefono").value,
            m: document.getElementById("marcaSelect").value,
            ti: document.getElementById("tipoIntervento").value
        };

        document.getElementById("marcaAltroGroup").style.display = (f.m === "Altro") ? "block" : "none";
        const ps = document.getElementById("problemaSelect").value;
        document.getElementById("erroriDisplayGroup").style.display = (ps === "Errore sul display") ? "block" : "none";
        document.getElementById("altroBox").style.display = (ps === "Altro" || ps === "Errore sul display") ? "block" : "none";
        document.getElementById("sezioneProblemi").style.display = (f.ti === "Prima accensione") ? "none" : "block";

        let done = 0; if(f.c) done++; if(f.com) done++; if(f.t) done++; if(f.m) done++; if(f.ti) done++;
        document.getElementById("progressBar").style.width = (done/5*100) + "%";
        document.getElementById("progressBar").innerText = (done/5*100) + "%";

        document.getElementById("previewContent").innerHTML = `<b>Cliente:</b> ${f.c || '-'}<br><b>Città:</b> ${f.com || '-'} (${f.p || '-'})<br><b>Stufa:</b> ${f.m || '-'}<br><b>Intervento:</b> ${f.ti || '-'}`;
    }

    function loadLocalStorage() { ids.forEach(id => { const v = localStorage.getItem(id); if(v && document.getElementById(id)) document.getElementById(id).value = v; }); }

    document.getElementById("btn").onclick = function() { 
        if(!document.getElementById("nomeCognome").value || !document.getElementById("comune").value) { alert("Mancano dati!"); return; }
        document.getElementById("modal").style.display = "flex"; 
    };

    document.getElementById("annulla").onclick = function() { document.getElementById("modal").style.display = "none"; };
    
    document.getElementById("conferma").onclick = function() {
        const v = {}; ids.forEach(id => v[id] = document.getElementById(id).value);
        const msg = `*RICHIESTA ASSISTENZA*\n👤 *Cliente:* ${v.nomeCognome}\n📍 *Indirizzo:* ${v.indirizzo}\n🏙️ *Comune:* ${v.comune} (${v.provincia})\n📱 *Tel:* ${v.telefono}\n🔥 *Marca:* ${v.marcaSelect}\n🧰 *Intervento:* ${v.tipoIntervento}\n🛠️ *Problema:* ${v.problemaSelect === 'Errore sul display' ? v.listaErrori : v.problemaSelect}`;
        window.open("https://wa.me/393394245508?text=" + encodeURIComponent(msg), "_blank");
        localStorage.clear(); location.reload();
    };
</script>
</body>
</html>
