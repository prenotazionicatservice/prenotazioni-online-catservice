<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT Service - Prenotazione Deluxe</title>

<style>
html, body{
    height:100%;
    margin:0;
    padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background: radial-gradient(circle at 20% 20%, #c62828, #9e9e9e, #f5f5f5);
    color:white;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
}

body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:30px 10px;
}

/* SFONDO SCINTILLE */
#sparkContainer{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:-2;
}
.sparkParticle{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:orange;
    opacity:0.8;
    animation:rise 2s linear infinite;
}
@keyframes rise{
    0% { transform: translateY(0) scale(0.5); opacity:1; }
    80% { transform: translateY(-300px) scale(1); opacity:0.5; }
    100% { transform: translateY(-350px) scale(0); opacity:0; }
}

/* LOGO */
.header{margin-bottom:20px; display:flex; justify-content:center;}
.header img{
    max-width:140px;
    animation:logoFire 1.2s infinite alternate;
}
@keyframes logoFire{
    0%{transform:scale(1) rotate(-2deg);}
    50%{transform:scale(1.05) rotate(2deg);}
    100%{transform:scale(1) rotate(-2deg);}
}

/* CONTAINER PREMIUM */
.container{
    width:100%;
    max-width:450px;
    background:linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.12));
    backdrop-filter:blur(25px);
    border-radius:25px;
    padding:30px 25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.25);
}

/* TITOLO FUOCO */
h2{text-align:center;font-size:24px;margin-bottom:25px;}
.fire{
    display:inline-block;
    font-size:24px;
    animation:fireContinuous 1s infinite alternate;
}
@keyframes fireContinuous{
    0% { transform: scale(1.1) rotate(-5deg); text-shadow:0 0 5px #ff9800,0 0 15px #ff5722,0 0 25px #ff0000;}
    50% { transform: scale(1.2) rotate(3deg); text-shadow:0 0 10px #ff9800,0 0 25px #ff5722,0 0 40px #ff0000;}
    100% { transform: scale(1.1) rotate(-5deg); text-shadow:0 0 5px #ff9800,0 0 15px #ff5722,0 0 25px #ff0000;}
}

/* INPUT PREMIUM CON ICONE */
.input-group{position:relative;margin-bottom:15px;transition:0.3s;}
.input-group input,
.input-group select,
.input-group textarea{
    width:100%;
    padding:16px 16px 16px 45px;
    border-radius:15px;
    border:none;
    background:rgba(255,255,255,0.12);
    color:white;
    outline:none;
    font-size:16px;
    box-shadow: inset 0 0 8px rgba(255,255,255,0.2);
    transition:0.3s;
}
.input-group textarea{min-height:100px;resize:none;}
.input-group input::placeholder,
.input-group select::placeholder,
.input-group textarea::placeholder{color:#ddd;transition:0.3s;}
.input-group input:focus::placeholder,
.input-group select:focus::placeholder,
.input-group textarea:focus::placeholder{color:#fff;opacity:0.6;}
.input-group input:focus,
.input-group select:focus,
.input-group textarea:focus{
    background:rgba(255,255,255,0.25);
    transform:scale(1.02);
    box-shadow: inset 0 0 12px rgba(255,255,255,0.3);
}
.icon{
    position:absolute;left:15px;top:50%;transform:translateY(-50%);
    opacity:0.8;font-size:18px;
}
.input-group input.error,.input-group select.error{border:2px solid red !important;}

/* BOTTONE WHATSAPP */
button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:linear-gradient(45deg,#22c55e,#16a34a);
    background-size:200% 200%;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    position:relative;
    overflow:hidden;
    animation:btnGradient 3s ease infinite, pulse 2s infinite;
}
@keyframes btnGradient{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.whatsapp-icon{width:26px;height:26px;animation:iconBounce 1.2s infinite;}
@keyframes iconBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes pulse{0%{box-shadow:0 0 15px rgba(34,197,94,0.6);}50%{box-shadow:0 0 30px rgba(34,197,94,1);}100%{box-shadow:0 0 15px rgba(34,197,94,0.6);}}
button::before{content:"";position:absolute;width:200%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);top:0;left:-100%;animation:shine 3s infinite;}
@keyframes shine{0%{left:-100%;}50%{left:100%;}100%{left:100%;}}

/* SCRITTA CAT SERVICE ROSSA + GLOW */
.animatedText{
    text-align:center;
    margin-top:20px;
    font-weight:bold;
    color:#ff0000;
    font-size:40px;
    animation: neonGlow 1.5s infinite alternate, glowBounce 1.5s infinite alternate;
    text-shadow:0 0 10px #ff6666,0 0 20px #ff3333,0 0 35px #ff1111,0 0 50px #ff1111;
}
@keyframes glowBounce{0%{transform:translateY(0) scale(1);}50%{transform:translateY(-10px) scale(1.05);}100%{transform:translateY(0) scale(1);}}
@keyframes neonGlow{0%{text-shadow:0 0 10px #ff6666,0 0 20px #ff3333,0 0 35px #ff1111,0 0 50px #ff1111;}50%{text-shadow:0 0 20px #ff6666,0 0 35px #ff3333,0 0 50px #ff1111,0 0 70px #ff1111;}100%{text-shadow:0 0 10px #ff6666,0 0 20px #ff3333,0 0 35px #ff1111,0 0 50px #ff1111;}}

/* MODALE */
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);}
.box{background:rgba(0,0,0,0.95);color:white;padding:25px;border-radius:20px;text-align:center;}
.box button{margin:8px;padding:12px 22px;border-radius:12px;font-weight:bold;cursor:pointer;}
.box .ok{background:#22c55e;color:white;}
.box .no{background:#555;color:white;}

/* SUCCESS */
.successOverlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:0.4s;}
.successOverlay.active{opacity:1;}
.successBox{width:120px;height:120px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;transform:scale(0.5);animation:pop 0.5s forwards;}
@keyframes pop{to{transform:scale(1);}}
.check{font-size:50px;color:white;animation:fadeIn 0.5s 0.3s forwards;opacity:0;}
@keyframes fadeIn{to{opacity:1;}}

/* RESPONSIVO */
@media(max-width:480px){
    .container{padding:20px 15px;}
    h2{font-size:22px;}
    .animatedText{font-size:28px;}
}
</style>
</head>
<body>

<div id="sparkContainer"></div>

<div class="header">
    <img src="./logo.png" alt="Logo CAT Service">
</div>

<div class="container">
<h2><span class="fire">🔥</span> Prenota il tuo intervento</h2>

<div class="input-group"><span class="icon">👤</span><input id="nome" placeholder="Nome"></div>
<div class="input-group"><span class="icon">👤</span><input id="cognome" placeholder="Cognome"></div>
<div class="input-group"><span class="icon">📍</span><input id="indirizzo" placeholder="Indirizzo completo"></div>
<div class="input-group"><span class="icon">📞</span><input id="telefono" placeholder="Telefono"></div>
<div class="input-group"><span class="icon">🔥</span><input id="marca" placeholder="Marca stufa"></div>
<div class="input-group"><span class="icon">🛠</span>
<select id="tipo">
<option value="">Tipologia intervento</option>
<option>Manutenzione</option>
<option>Riparazione</option>
<option>Prima accensione</option>
</select>
</div>
<div class="input-group"><span class="icon">📝</span><textarea id="note" placeholder="Descrivi brevemente il problema (facoltativo)"></textarea></div>
<div class="input-group"><span class="icon">📅</span><input id="data" readonly></div>

<button id="btn"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="whatsapp-icon">Prenota su WhatsApp</button>

<div class="animatedText">CAT SERVICE DI FABIO CAMPITIELLO</div>
</div>

<div class="modal" id="modal">
<div class="box">
<h3>Conferma invio prenotazione?</h3>
<button class="ok" id="conferma">Invia</button>
<button class="no" id="annulla">Annulla</button>
</div>
</div>

<div class="successOverlay" id="success">
<div class="successBox"><div class="check">✓</div></div>
</div>

<script>
data.value=new Date().toLocaleDateString("it-IT");

let msg="";
btn.onclick=()=>{
    let campi=["nome","cognome","indirizzo","telefono","marca","tipo"];
    let ok=true;
    campi.forEach(id=>{
        let el=document.getElementById(id);
        el.classList.remove("error");
        if(!el.value){el.classList.add("error"); ok=false;}
    });
    if(!ok) return;
    if(navigator.vibrate) navigator.vibrate(100);

    msg=`🔥 Prenotazione CAT Service
Nome: ${nome.value} ${cognome.value}
Indirizzo: ${indirizzo.value}
Telefono: ${telefono.value}
Marca: ${marca.value}
Tipo intervento: ${tipo.value}
Data: ${data.value}
${note.value? "Problema: "+note.value : ""}`;

    modal.style.display="flex";
};

conferma.onclick=()=>{
    if(navigator.vibrate) navigator.vibrate(200);
    modal.style.display="none";
    success.classList.add("active");
    setTimeout(()=>{
        success.classList.remove("active");
        window.open("https://wa.me/393394245508?text="+encodeURIComponent(msg));
    },1200);
};

annulla.onclick=()=>{modal.style.display="none";}

// SCINTILLE SFONDO
const sparkContainer = document.getElementById("sparkContainer");
function createSpark(){
    const spark=document.createElement("div");
    spark.className="sparkParticle";
    spark.style.left=Math.random()*window.innerWidth+"px";
    spark.style.top=window.innerHeight+"px";
    spark.style.animationDuration=(1.5+Math.random()*1.2)+"s";
    sparkContainer.appendChild(spark);
    setTimeout(()=>spark.remove(),2200);
}
setInterval(createSpark,150);
</script>
</body>
</html>
