<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C.A.T. SERVICE - Prenotazione</title>

    <style>
        /* RESET GENERALE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #200505;
            background: radial-gradient(circle at 50% 50%, #450a0a, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 80px 15px 40px 15px; 
            color: #fff;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(239, 68, 68, 0.4);
            z-index: 1000;
        }

        .nav-content { display: flex; align-items: center; gap: 12px; }
        .mini-logo { height: 35px; width: auto; filter: drop-shadow(0 0 5px #ef4444); }
        .nav-title { font-weight: bold; font-size: 14px; letter-spacing: 1px; color: #ef4444; text-transform: uppercase; }

        .container {
            width: 100%;
            max-width: 450px; 
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); 
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            animation: openingGlow 1.2s ease-out forwards;
        }

        @keyframes openingGlow {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        }

        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-img {
            width: 220px;
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.5));
            animation: logoPulse 3s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* --- PROGRESS BAR --- */
        .progress-container {
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #ef4444;
            transition: width 0.5s ease, background 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: white;
        }

        /* --- GRID PER CAMPI UNITI --- */
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group { margin-bottom: 15px; width: 100%; }
        label { display: block; font-size: 11px; color: #ef4444; text-transform: uppercase; margin-bottom: 5px; padding-left: 5px; font-weight: bold; }
        
        .input-icon { position: relative; display: flex; align-items: center; width: 100%; }
        .input-icon span {
            position: absolute;
            left: 12px;
            font-size: 18px;
            z-index: 5;
            pointer-events: none;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px 12px 42px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px; 
            transition: 0.3s;
        }

        select option {
            background-color: #1a1a1a;
            color: white;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ef4444;
            background: rgba(255, 255, 255, 0.15);
        }

        /* --- BOTTONE WHATSAPP ULTRAMODERNO --- */
        button#btn {
            position: relative;
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
            color: white;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Effetto Riflesso (Glow) */
        button#btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(45deg);
            transition: 0.6s;
            pointer-events: none;
        }

        button#btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 30px rgba(37, 211, 102, 0.6);
        }

        button#btn:hover::before {
            left: 100%;
        }

        button#btn:active {
            transform: scale(0.98);
        }

        /* --- ANTEPRIMA DATI --- */
        .preview-box {
            margin-top: 25px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border: 1px dashed rgba(239, 68, 68, 0.5);
            font-size: 13px;
            line-height: 1.6;
        }
        .preview-title {
            color: #ef4444;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: bold;
            display: block;
        }

        .privacy-notice { font-size: 10px; color: #aaa; text-align: center; margin: 15px 0; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .box { background: #111; padding: 25px; border-radius: 20px; text-align: center; border: 2px solid #ef4444; width: 100%; max-width: 320px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .ok { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; flex: 1; font-weight: bold; }
        .no { background: #444; color: white; border: none; padding: 12px; border-radius: 10px; flex: 1; }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="nav-content">
        <img src="logo.PNG" alt="Mini Logo" class="mini-logo" onerror="this.src='logo.png';">
        <span class="nav-title">C.A.T. Service</span>
    </div>
</nav>

<div class="container">
    <div class="logo-container">
        <img src="logo.PNG?v=1" alt="C.A.T. Service" class="logo-img" onerror="this.src='logo.png';">
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <div class="input-group">
        <div class="input-icon"><span>👤</span><input type="text" id="nomeCognome" placeholder="Nome e Cognome" oninput="updateUI()"></div>
    </div>

    <div class="input-group"><div class="input-icon"><span>📍</span><input type="text" id="indirizzo" placeholder="Indirizzo completo" oninput="updateUI()"></div></div>

    <div class="input-row">
        <div class="input-icon"><span>📱</span><input type="tel" id="telefono" placeholder="Cellulare" oninput="updateUI()"></div>
        <div class="input-icon"><span>☎️</span><input type="tel" id="telefono_fisso" placeholder="Fisso (opz)" oninput="updateUI()"></div>
    </div>

    <div class="input-row">
        <div class="input-icon">
            <span>🔥</span>
            <select id="marcaSelect" onchange="updateUI()">
                <option value="">Marca</option>
                <option value="MCZ">MCZ</option>
                <option value="PALAZZETTI">PALAZZETTI</option>
                <option value="RAVELLI">RAVELLI</option>
                <option value="MORETTI DESIGN">MORETTI DESIGN</option>
                <option value="PEGASO">PEGASO</option>
                <option value="RED">RED</option>
                <option value="BRISACH">BRISACH</option>
                <option value="CADEL">CADEL</option>
                <option value="FREEPOINT">FREEPOINT</option>
                <option value="ROYAL">ROYAL</option>
                <option value="Elledì">Elledì</option>
                <option value="Karmek One">Karmek One</option>
                <option value="Lincar">Lincar</option>
                <option value="Altro">Altro...</option>
            </select>
        </div>
        <div class="input-icon"><span>⚙️</span><input type="text" id="modello" placeholder="Modello (opz)" oninput="updateUI()"></div>
    </div>

    <div class="input-group" id="marcaAltroGroup" style="display:none;"><div class="input-icon"><span>✍️</span><input type="text" id="marcaAltro" placeholder="Specifica marca" oninput="updateUI()"></div></div>

    <div class="input-group">
        <div class="input-icon">
            <span>🧰</span>
            <select id="tipoIntervento" onchange="updateUI()">
                <option value="">Tipologia intervento</option>
                <option value="Manutenzione">Manutenzione</option>
                <option value="Riparazione">Riparazione</option>
                <option value="Prima accensione">Prima accensione</option>
            </select>
        </div>
    </div>

    <div id="sezioneProblemi">
        <div class="input-group">
            <div class="input-icon">
                <span>🛠️</span>
                <select id="problemaSelect" onchange="updateUI()">
                    <option value="">Seleziona problema</option>
                    <option value="Errore sul display">Errore sul display ⚠️</option>
                    <option value="Stufa non si accende">Stufa non si accende</option>
                    <option value="Vetro subito nero">Vetro subito nero</option>
                    <option value="Rumore anomalo">Rumore anomalo</option>
                    <option value="Si spegne da sola">Si spegne da sola</option>
                    <option value="Non carica pellet">Non carica pellet</option>
                    <option value="Altro">Altro (specifica sotto)</option>
                </select>
            </div>
        </div>

       <div class="input-group" id="erroriDisplayGroup" style="display:none;">
            <div class="input-icon">
                <span>📟</span>
                <select id="listaErrori" onchange="updateUI()">
                    <option value="">Seleziona l'allarme...</option>
                    <option value="AL 1 - Blackout">AL 1 - Blackout / Mancanza Rete</option>
                    <option value="AL 2 - Sonda Fumi">AL 2 - Sonda Fumi Guasta</option>
                    <option value="AL 3 - Hot Fumi">AL 3 - Hot Fumi (Eccessivo Calore)</option>
                    <option value="AL 4 - Aspiratore">AL 4 - Guasto Estrattore Fumi</option>
                    <option value="AL 5 - No Accensione">AL 5 - Mancata Accensione</option>
                    <option value="AL 6 - No Pellet">AL 6 - Mancanza Pellet / Fiamma</option>
                    <option value="AL 7 - Termico">AL 7 - Sicurezza Termica (Reset)</option>
                    <option value="AL 8 - No Depressione">AL 8 - Errore Depressione / Canna Fumaria</option>
                    <option value="AL 9 - Coclea">AL 9 - Blocco Sistema Carico Pellet</option>
                    <option value="SERVICE/PULIZIA">SERVICE/PULIZIA</option>
                    <option value="Errore Triac Coclea">Errore Triac Coclea</option>
                    <option value="Errore Sonda K">Errore Sonda K</option>
                    <option value="Errore Pulizia braciere">Errore Pulizia braciere</option>
                    <option value="Errore Pressione Alta">Errore Pressione Alta</option>
                    <option value="Errore Pressione Bassa">Errore Pressione Bassa</option>
                    <option value="Errore Debimetro/No flusso">Errore Debimetro/No flusso</option>
                    <option value="Errore Porta Apert/sportello pellet">Errore Porta Aperta/sportello pellet</option>
                    <option value="Errore NO SEGNALE">Errore NO SEGNALE</option>
                    <option value="Altro">Altro errore non in lista</option>
                </select>
            </div>
        </div>

        <div class="input-group" id="altroBox" style="display:none;">
            <div class="input-icon"><span>📝</span><textarea id="problemaNote" placeholder="Descrivi il guasto" oninput="updateUI()"></textarea></div>
        </div>
    </div>

    <div class="input-group">
        <label>Data di oggi</label>
        <input type="text" id="data" readonly style="text-align:center; color:#ef4444; font-weight:bold; background:rgba(0,0,0,0.2);">
    </div>

    <button id="btn">
        <svg width="24" height="24" viewBox="0 0 448 512" fill="white"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.7 17.8 69.4 27.2 106.2 27.2 122.4 0 222-99.6 222-222 0-59.3-23-115.1-65.1-157.1zM223.9 446.7c-33.1 0-65.6-8.9-93.9-25.7l-6.7-4-69.8 18.3 18.7-68.1-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.5-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 54 81.2 54 130.4 0 101.7-82.8 184.5-184.5 184.5zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.2-16.4-14.6-27.4-32.7-30.6-38.1-3.2-5.5-.3-8.5 2.4-11.2 2.5-2.4 5.5-6.5 8.3-9.7 2.8-3.3 3.7-5.6 5.6-9.3 1.9-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.7 23.5 9.2 31.6 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
        Invia Richiesta
    </button>

    <div class="preview-box" id="previewBox">
        <span class="preview-title">Anteprima Messaggio:</span>
        <div id="previewContent">Inizia a compilare...</div>
    </div>

    <div class="privacy-notice">L'invio acconsente al trattamento dei dati (GDPR).</div>
</div>

<div class="modal" id="modal">
    <div class="box">
        <h3>Conferma Invio</h3>
        <p style="color:#ccc; margin:10px 0;">Procedere con l'invio su WhatsApp?</p>
        <div class="modal-btns">
            <button class="no" id="annulla">Modifica</button>
            <button class="ok" id="conferma">Invia Ora</button>
        </div>
    </div>
</div>

<script>
    const ids = ["nomeCognome", "indirizzo", "telefono", "telefono_fisso", "marcaSelect", "marcaAltro", "modello", "tipoIntervento", "problemaSelect", "listaErrori", "problemaNote"];

    window.onload = function() {
        document.getElementById("data").value = new Date().toLocaleDateString('it-IT');
        loadLocalStorage();
        updateUI();
    };

    function saveLocalStorage() {
        ids.forEach(id => {
            const el = document.getElementById(id);
            if(el) localStorage.setItem(id, el.value);
        });
    }

    function loadLocalStorage() {
        ids.forEach(id => {
            const savedValue = localStorage.getItem(id);
            const el = document.getElementById(id);
            if(savedValue !== null && el) el.value = savedValue;
        });
    }

    function updateUI() {
        saveLocalStorage();
        const fields = {
            cliente: document.getElementById("nomeCognome").value,
            indirizzo: document.getElementById("indirizzo").value,
            telefono: document.getElementById("telefono").value,
            marca: document.getElementById("marcaSelect").value,
            tipo: document.getElementById("tipoIntervento").value
        };

        document.getElementById("marcaAltroGroup").style.display = (fields.marca === "Altro") ? "block" : "none";
        const probSel = document.getElementById("problemaSelect").value;
        document.getElementById("erroriDisplayGroup").style.display = (probSel === "Errore sul display") ? "block" : "none";
        document.getElementById("altroBox").style.display = (probSel === "Altro" || probSel === "Errore sul display") ? "block" : "none";
        document.getElementById("sezioneProblemi").style.display = (fields.tipo === "Prima accensione") ? "none" : "block";

        let completed = 0;
        if(fields.cliente) completed++;
        if(fields.indirizzo) completed++;
        if(fields.telefono) completed++;
        if(fields.marca) completed++;
        if(fields.tipo) completed++;

        const percent = Math.round((completed / 5) * 100);
        const bar = document.getElementById("progressBar");
        bar.style.width = percent + "%";
        bar.innerText = percent + "%";
        
        if(percent < 50) bar.style.background = "#ef4444";
        else if(percent < 100) bar.style.background = "#f59e0b";
        else bar.style.background = "#22c55e";

        const marcaFinale = fields.marca === "Altro" ? document.getElementById("marcaAltro").value : fields.marca;
        const modF = document.getElementById("modello").value;
        const problemaFinale = probSel === "Errore sul display" ? "Errore: " + document.getElementById("listaErrori").value : probSel;
        const note = document.getElementById("problemaNote").value;

        document.getElementById("previewContent").innerHTML = `
            <b>Cliente:</b> ${fields.cliente || '-'}<br>
            <b>Cell:</b> ${fields.telefono || '-'}<br>
            <b>Stufa:</b> ${marcaFinale || '-'} ${modF ? '('+modF+')' : ''}<br>
            <b>Intervento:</b> ${fields.tipo || '-'}<br>
            ${fields.tipo !== "Prima accensione" ? `<b>Problema:</b> ${problemaFinale || '-'}` : ''}
        `;
    }

    let messaggioGlobal = "";

    document.getElementById("btn").onclick = function() {
        const cliente = document.getElementById("nomeCognome").value.trim();
        const indirizzo = document.getElementById("indirizzo").value.trim();
        const telefono = document.getElementById("telefono").value.trim();
        const telefono_fisso = document.getElementById("telefono_fisso").value.trim();
        const marca = document.getElementById("marcaSelect").value === "Altro" ? document.getElementById("marcaAltro").value : document.getElementById("marcaSelect").value;
        const modello = document.getElementById("modello").value.trim();
        const tipo = document.getElementById("tipoIntervento").value;

        if(!cliente || !indirizzo || !telefono || !marca || !tipo) {
            alert("Compila tutti i campi obbligatori (segnalati dalla barra di progresso)."); return;
        }

        let prob = document.getElementById("problemaSelect").value;
        if(prob === "Errore sul display") prob = "Errore: " + document.getElementById("listaErrori").value;
        const note = document.getElementById("problemaNote").value;

        messaggioGlobal = `*RICHIESTA INTERVENTO*\n*C.A.T. SERVICE*\n\n👤 *Cliente:* ${cliente}\n📍 *Indirizzo:* ${indirizzo}\n📱 *Cell:* ${telefono}\n${telefono_fisso ? "☎️ *Fisso:* "+telefono_fisso+"\n" : ""}🔥 *Stufa:* ${marca} ${modello ? "("+modello+")" : ""}\n🧰 *Intervento:* ${tipo}\n${tipo !== "Prima accensione" ? "🛠️ *Problema:* "+prob+(note ? " ("+note+")" : "")+"\n" : ""}📅 *Data:* ${document.getElementById("data").value}`;
        
        document.getElementById("modal").style.display = "flex";
    };

    document.getElementById("annulla").onclick = function() { document.getElementById("modal").style.display = "none"; };
    
    document.getElementById("conferma").onclick = function() {
        window.open("https://wa.me/393394245508?text=" + encodeURIComponent(messaggioGlobal), "_blank");
        document.getElementById("modal").style.display = "none";
        localStorage.clear();
        ids.forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = ""; });
        updateUI();
    };
</script>

</body>
</html>
