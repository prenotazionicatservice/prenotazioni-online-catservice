<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT Service - Prenotazione Deluxe</title>

<style>
:root{--vh:100vh;}
html, body{
    height:100%; margin:0; padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background: radial-gradient(circle at 20% 20%, #c62828, #9e9e9e, #f5f5f5);
    color:white;
    overflow-y:auto;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding-top: calc(50vh - 250px);
}

/* CONTAINER */
.container{
    width:90%; max-width:550px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border-radius:25px;
    padding:25px;
}

/* INPUT */
.input-group{position:relative;margin-bottom:15px;}
.input-group input,
.input-group select,
.input-group textarea{
    width:100%;
    padding:14px 14px 14px 40px;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.2);
    color:white;
}

.icon{
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
}

/* BUTTON */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.7);
}

.box{
    background:#000;
    padding:20px;
    border-radius:15px;
}

.ok{background:#22c55e;}
.no{background:#555;}
</style>
</head>

<body>

<div class="container">

<h2>🔥 Prenota intervento</h2>

<div class="input-group"><input id="nome" placeholder="Nome"><span class="icon">👤</span></div>
<div class="input-group"><input id="cognome" placeholder="Cognome"><span class="icon">👤</span></div>
<div class="input-group"><input id="indirizzo" placeholder="Indirizzo"><span class="icon">📍</span></div>
<div class="input-group"><input id="telefono" placeholder="Telefono"><span class="icon">📞</span></div>
<div class="input-group"><input id="telefono_fisso" placeholder="Telefono fisso"><span class="icon">☎️</span></div>
<div class="input-group"><input id="marca" placeholder="Marca"><span class="icon">🔥</span></div>
<div class="input-group"><input id="modello" placeholder="Modello"><span class="icon">🔧</span></div>

<div class="input-group">
<select id="tipo">
<option value="">Tipologia intervento</option>
<option>Manutenzione</option>
<option>Riparazione</option>
<option>Prima accensione</option>
</select><span class="icon">🛠</span>
</div>

<div class="input-group">
<textarea id="note" placeholder="Problema (facoltativo)"></textarea>
<span class="icon">📝</span>
</div>

<div class="input-group">
<input id="data" readonly>
<span class="icon">📅</span>
</div>

<button id="btn">Prenota su WhatsApp</button>

</div>

<div class="modal" id="modal">
<div class="box">
<h3>Confermare invio?</h3>
<button class="ok" id="conferma">Invia</button>
<button class="no" id="annulla">Annulla</button>
</div>
</div>

<script>
data.value=new Date().toLocaleDateString("it-IT");

let msg="";

btn.onclick=()=>{
    let campi=["nome","cognome","indirizzo","telefono","marca","tipo"];
    let ok=true;

    campi.forEach(id=>{
        if(!document.getElementById(id).value) ok=false;
    });

    if(!ok){
        alert("Compila i campi obbligatori");
        return;
    }

    msg=`Prenotazione intervento

Nome: ${nome.value} ${cognome.value}
Indirizzo: ${indirizzo.value}
Telefono: ${telefono.value}
Telefono fisso: ${telefono_fisso.value}

Marca: ${marca.value}
Modello: ${modello.value}

Tipo: ${tipo.value}
${note.value ? "Problema: " + note.value : ""}

Data: ${data.value}`;

    modal.style.display="flex";
};

annulla.onclick=()=>modal.style.display="none";

conferma.onclick=()=>{
    modal.style.display="none";

    let url="https://api.whatsapp.com/send?phone=393394245508&text="+encodeURIComponent(msg);

    if(/Android|iPhone|iPad/i.test(navigator.userAgent)){
        window.location.href=url;
    }else{
        window.open(url,"_blank");
    }
};
</script>

</body>
</html>
