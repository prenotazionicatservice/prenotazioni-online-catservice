<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT Service - Prenotazione Deluxe</title>

<style>
:root{--vh:100vh;}
html, body{
    height:100%; margin:0; padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background: radial-gradient(circle at 20% 20%, #c62828, #9e9e9e, #f5f5f5);
    color:white;
    overflow-y:auto;
}

/* SFONDO SCINTILLE */
#sparkContainer{position:fixed; inset:0; pointer-events:none; z-index:-2;}
.sparkParticle{position:absolute;width:4px;height:4px;border-radius:50%;background:orange;opacity:0.8; animation:rise 2s linear infinite;}
@keyframes rise{0%{transform:translateY(0) scale(0.5);opacity:1;}80%{transform:translateY(-300px) scale(1);opacity:0.5;}100%{transform:translateY(-350px) scale(0);opacity:0;}}

/* LOGO */
.header{margin:20px 0;display:flex;justify-content:center;}
.header img{max-width:140px;animation:logoFire 1.2s infinite alternate;}
@keyframes logoFire{0%{transform:scale(1) rotate(-2deg);}50%{transform:scale(1.05) rotate(2deg);}100%{transform:scale(1) rotate(-2deg);}}

/* CONTAINER */
.container{
    width:90%; max-width:550px; margin:auto;
    background:linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.12));
    backdrop-filter:blur(25px);
    border-radius:25px;
    padding:30px 25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.25);
}

/* TITOLI */
h2{text-align:center;font-size:24px;margin-bottom:25px;}

/* INPUT */
.input-group{position:relative;margin-bottom:15px;}
.input-group input,
.input-group select,
.input-group textarea{
    width:100%;
    padding:16px 16px 16px 45px;
    border-radius:15px;
    border:none;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:16px;
}

/* ICONE */
.icon{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    font-size:18px;
}

/* ICONA ATTIVA */
.input-group.active .icon{
    color:#22c55e;
    transform:translateY(-50%) scale(1.2);
    text-shadow:0 0 10px #22c55e;
}

/* TAP */
@keyframes tap{
    0%{transform:scale(1);}
    50%{transform:scale(0.92);}
    100%{transform:scale(1);}
}
.tap{animation:tap 0.15s ease;}

textarea{min-height:100px;resize:none;}

/* BOTTONE */
button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:linear-gradient(45deg,#22c55e,#16a34a);
    color:white;
    font-size:17px;
    cursor:pointer;
}

/* ANTEPRIMA */
#previewBox p{
    background:#22c55e;
    color:#000;
    padding:10px;
    border-radius:12px;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.8);
}
.box{background:#000;padding:20px;border-radius:15px;}
</style>
</head>

<body>

<div id="sparkContainer"></div>

<div class="header">
<img src="./logo.png">
</div>

<div class="container">

<h2>🔥 Prenota intervento</h2>

<div class="input-group"><input id="nome" placeholder="Nome"><span class="icon">👤</span></div>
<div class="input-group"><input id="cognome" placeholder="Cognome"><span class="icon">👤</span></div>
<div class="input-group"><input id="indirizzo" placeholder="Indirizzo"><span class="icon">📍</span></div>
<div class="input-group"><input id="telefono" placeholder="Telefono"><span class="icon">📞</span></div>
<div class="input-group"><input id="telefono_fisso" placeholder="Telefono fisso"><span class="icon">☎️</span></div>
<div class="input-group"><input id="marca" placeholder="Marca"><span class="icon">🔥</span></div>
<div class="input-group"><input id="modello" placeholder="Modello"><span class="icon">🔧</span></div>

<div class="input-group">
<select id="tipo">
<option value="">Tipo intervento</option>
<option>Manutenzione</option>
<option>Riparazione</option>
<option>Prima accensione</option>
</select>
<span class="icon">🛠</span>
</div>

<div class="input-group">
<textarea id="note" placeholder="Problema"></textarea>
<span class="icon">📝</span>
</div>

<div class="input-group">
<input id="data" readonly>
<span class="icon">📅</span>
</div>

<button id="btn">Prenota su WhatsApp</button>

<div id="previewBox" style="display:none;margin-top:15px;">
<p id="previewText"></p>
</div>

</div>

<div class="modal" id="modal">
<div class="box">
<p>Inviare su WhatsApp?</p>
<button id="conferma">Invia</button>
<button id="annulla">Annulla</button>
</div>
</div>

<script>
data.value=new Date().toLocaleDateString("it-IT");

let msg="";

btn.onclick=()=>{
if(!nome.value||!cognome.value||!indirizzo.value||!telefono.value||!marca.value||!tipo.value){
alert("Compila i campi!");
return;
}

msg=`Prenotazione
Nome: ${nome.value} ${cognome.value}
Indirizzo: ${indirizzo.value}
Telefono: ${telefono.value}
Marca: ${marca.value}
Tipo: ${tipo.value}
${note.value ? "Problema: "+note.value : ""}
Data: ${data.value}`;

previewText.innerText=msg;
previewBox.style.display="block";

modal.style.display="flex";
};

conferma.onclick=()=>{
window.open("https://wa.me/393394245508?text="+encodeURIComponent(msg));
modal.style.display="none";
};

annulla.onclick=()=>modal.style.display="none";

/* ICONE ATTIVE */
document.querySelectorAll("input,select,textarea").forEach(el=>{
el.addEventListener("input",function(){
this.parentElement.classList.toggle("active", this.value.trim()!=="");
});
});

/* TAP */
document.querySelectorAll("input,select,textarea,button").forEach(el=>{
el.addEventListener("click",function(){
this.classList.add("tap");
setTimeout(()=>this.classList.remove("tap"),150);
});
});
</script>

</body>
</html>
